// ── PIPELINE ────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function PipelinePage({leads,setLeads,openLead,openWA}){
  const [drag,setDrag]=useState(null);
  const [over,setOver]=useState(null);
  return (
    <div className="pipeline-wrap">
      {STAGES.map(stage=>{
        const sl=leads.filter(l=>l.stage===stage);
        const c=SC[stage];
        return (
          <div key={stage} className="p-col" style={{borderColor:over===stage?c:undefined}}
            onDragOver={e=>{e.preventDefault();setOver(stage);}}
            onDrop={e=>{e.preventDefault();if(drag&&drag.stage!==stage)setLeads(p=>p.map(l=>l.id===drag.id?{...l,stage}:l));setDrag(null);setOver(null);}}
            onDragLeave={()=>setOver(null)}>
            <div className="p-col-hd"><div className="flex ic gap2"><div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{fontSize:11,fontWeight:800}}>{stage}</span></div><span style={{fontSize:10,background:"var(--surface2)",color:"var(--text3)",padding:"1px 7px",borderRadius:20,fontFamily:"var(--mono)"}}>{sl.length}</span></div>
            <div className="p-col-body">
              {sl.map(lead=>(
                <div key={lead.id} className="p-card" draggable onDragStart={e=>{setDrag(lead);e.dataTransfer.effectAllowed="move";}} onClick={()=>openLead(lead)}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{lead.name}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)",marginBottom:7}}>{lead.phone}</div>
                  <div className="flex ic" style={{justifyContent:"space-between"}}>
                    <span style={{fontSize:10,color:"var(--green)",fontFamily:"var(--mono)"}}>{fmt(lead.value||0)}</span>
                    <div className="wa-btn" style={{width:22,height:22,fontSize:11}} onClick={e=>{e.stopPropagation();window.open("https://wa.me/91"+lead.phone,"_blank");}}>💬</div>
                  </div>
                  {lead.followUp&&<div style={{fontSize:9,color:"var(--yellow)",marginTop:5}}>📅 {lead.followUp}</div>}
                </div>
              ))}
              {sl.length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:10,padding:"16px 0",opacity:.5}}>Drop here</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ── IMPORT PAGE ─────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function ImportPage({leads,setLeads,currentUser,users}){
  const [drag,setDrag]=useState(false);
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(null);
  const ref=useRef();
  const downloadTemplate=()=>{
    const ws=XLSX.utils.aoa_to_sheet([["Name","Phone","Email","Source","Campaign","Stage","Value","Follow-up Date (YYYY-MM-DD)","Notes"],["Priya Sharma","9876543210","priya@email.com","Meta Lead Ads","Summer Sale","New Lead","25000","2024-03-15","Very interested"],["Amit Gupta","9123456789","","Google Ads","","Contacted","18000","",""]]);
    ws["!cols"]=[{wch:20},{wch:14},{wch:25},{wch:18},{wch:16},{wch:16},{wch:10},{wch:22},{wch:30}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Leads");XLSX.writeFile(wb,"FreeLeadManagement_Template.xlsx");
  };
  const process=file=>{
    const r=new FileReader();
    r.onload=e=>{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      const parsed=rows.map((r,i)=>({id:Date.now()+i,bizId:currentUser.bizId,name:String(r.Name||r.name||"").trim(),phone:String(r.Phone||r.phone||"").trim(),email:String(r.Email||r.email||"").trim(),source:r.Source||r.source||"Excel Upload",campaign:r.Campaign||r.campaign||"",stage:STAGES.includes(r.Stage)?"New Lead":r.Stage||"New Lead",value:Number(r.Value||r.value||0),followUp:r["Follow-up Date (YYYY-MM-DD)"]||"",notes:r.Notes?[{text:String(r.Notes),date:new Date().toISOString().split("T")[0]}]:[],calls:[],assignedTo:"",createdAt:new Date().toISOString().split("T")[0]})).filter(r=>r.name&&r.phone);
      setPreview(parsed);setDone(null);
    };
    r.readAsArrayBuffer(file);
  };
  return (
    <div style={{maxWidth:760}}>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">📥 Import Leads from Excel</div>
        <p className="sm muted" style={{marginBottom:16}}>Download our Excel template, fill in your leads, then upload it here. Leads will be added to your pipeline instantly.</p>
        <button className="btn btn-success" onClick={downloadTemplate}>⬇️ Download Excel Template</button>
        <div className="alert alert-info" style={{marginTop:14}}>Required columns: <strong>Name, Phone</strong>  -  all others are optional</div>
      </div>
      {done&&<div className="alert alert-ok" style={{marginBottom:16}}>✅ Successfully imported <strong>{done} leads</strong>!</div>}
      <div className="card">
        <div className="card-title">Upload File</div>
        <div className={"drop-zone"+(drag?" drag":"")} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);}} onClick={()=>ref.current.click()}>
          <div style={{fontSize:36,marginBottom:10}}>📂</div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Click or drag & drop your Excel file</div>
          <div className="muted sm">Supports .xlsx and .xls</div>
          <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>process(e.target.files[0])}/>
        </div>
        {preview&&preview.length>0&&(
          <div style={{marginTop:16}}>
            <div className="flex ic" style={{marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:13}}>{preview.length} leads ready to import</div>
              <div className="flex gap2 mla">
                <button className="btn btn-ghost btn-sm" onClick={()=>setPreview(null)}>Cancel</button>
                <button className="btn btn-primary btn-sm" onClick={()=>{setLeads(p=>[...p,...preview]);setDone(preview.length);setPreview(null);}}>Import All ></button>
              </div>
            </div>
            <div className="table-wrap" style={{maxHeight:260,overflowY:"auto"}}>
              <table><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Source</th><th>Stage</th><th>Value</th><th>Follow-up</th></tr></thead>
              <tbody>{preview.slice(0,50).map((l,i)=><tr key={i}><td className="xs mono muted">{i+1}</td><td className="bold">{l.name}</td><td className="mono xs muted">{l.phone}</td><td><span className="tag tag-blue">{l.source}</span></td><td><StageBadge stage={l.stage}/></td><td className="mono sm" style={{color:"var(--green)"}}>{fmt(l.value)}</td><td className="mono xs muted">{l.followUp||" - "}</td></tr>)}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TeamPage({users,setUsers,leads,currentUser}){

  const [editPw,setEditPw]=useState("");

  const create=()=>{
    setErr("");
    if(!form.name||!form.email||!form.password){setErr("Name, email, password required.");return;}
    if(users.find(u=>u.email.toLowerCase()===form.email.toLowerCase())){setErr("Email already exists.");return;}
    setUsers(p=>[...p,{id:"u"+Date.now(),bizId:currentUser.bizId,...form,active:true}]);

              <td><RoleBadge role={u.role}/></td>
              <td className="mono">{leads.filter(l=>l.assignedTo===u.id).length}</td>
              <td className="mono" style={{color:"var(--green)"}}>{leads.filter(l=>l.assignedTo===u.id&&l.stage==="Converted").length}</td>
              <td><span className={"tag "+(u.active?"tag-green":"tag-red")}>{u.active?"Active":"Inactive"}</span></td>
              <td>{editId===u.id?(<div className="flex gap2"><input type="text" value={editPw} onChange={e=>setEditPw(e.target.value)} placeholder="New password" style={{width:120,padding:"4px 8px",fontSize:12}}/><button className="btn btn-sm btn-primary" onClick={()=>{if(!editPw.trim())return;setUsers(p=>p.map(x=>x.id===u.id?{...x,password:editPw}:x));setEditId(null);setEditPw("");}}>Save</button><button className="btn btn-sm btn-ghost" onClick={()=>setEditId(null)}>✕</button></div>):(<button className="btn btn-sm btn-warning" onClick={()=>{setEditId(u.id);setEditPw("");}}>🔑 Change</button>)}</td>
              <td><button className={"btn btn-sm "+(u.active?"btn-danger":"btn-success")} onClick={()=>setUsers(p=>p.map(x=>x.id===u.id?{...x,active:!x.active}:x))}>{u.active?"Disable":"Enable"}</button></td>
            </tr>

        </tbody></table>
      </div>
      {modal&&(
        <div className="overlay" onClick={()=>setModal(false)}>
          <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>

            <div className="modal-bd">
              {err&&<div className="alert alert-err">{err}</div>}
              <div className="form-grid">
                <div className="form-group full"><label>Full Name *</label><input type="text" placeholder="Rahul Kumar" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
                <div className="form-group"><label>Email * (login)</label><input type="email" placeholder="rahul@company.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
                <div className="form-group"><label>Mobile</label><input type="tel" placeholder="9876543210" value={form.phone} onChange={e=>set("phone",e.target.value)}/></div>
                <div className="form-group"><label>Password *</label><input type="text" placeholder="Rahul@123" value={form.password} onChange={e=>set("password",e.target.value)}/></div>
                <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>set("role",e.target.value)}><option>Sales</option><option>Business Admin</option></select></div>

// ── PROFILE PAGE ────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function ProfilePage({currentUser,setCurrentUser,users,setUsers,businesses,setBusinesses}){
  const [tab,setTab]=useState("info");
  const [pf,setPf]=useState({curr:"",np:"",cp:""});
  const [show,setShow]=useState(false);
  const [msg,setMsg]=useState(null);
  const isSA=currentUser.role==="Super Admin";
  const isBA=currentUser.role==="Business Admin";
  const changePw=()=>{
    setMsg(null);
    if(!pf.curr||!pf.np||!pf.cp){setMsg({t:"err",m:"All fields required."});return;}
    if(pf.np!==pf.cp){setMsg({t:"err",m:"New passwords don't match."});return;}
    if(pf.np.length<6){setMsg({t:"err",m:"Password must be 6+ chars."});return;}
    if(isSA){setMsg({t:"err",m:"Super Admin password is hardcoded. Edit the source code."});return;}
    if(isBA){
      const biz=businesses.find(b=>b.id===currentUser.bizId);
      if(!biz||biz.password!==pf.curr){setMsg({t:"err",m:"Current password incorrect."});return;}
      setBusinesses(p=>p.map(b=>b.id===currentUser.bizId?{...b,password:pf.np}:b));
    } else {
      const user=users.find(u=>u.id===currentUser.id);
      if(!user||user.password!==pf.curr){setMsg({t:"err",m:"Current password incorrect."});return;}
      setUsers(p=>p.map(u=>u.id===currentUser.id?{...u,password:pf.np}:u));
    }
    setPf({curr:"",np:"",cp:""});
    setMsg({t:"ok",m:"Password updated! Use it on next login."});
  };
  const biz=isBA?businesses.find(b=>b.id===currentUser.bizId):null;
  return (
    <div style={{maxWidth:680}}>
      <div className="tabs">{[{k:"info",l:"👤 My Info"},{k:"password",l:"🔑 Change Password"}].map(t=><div key={t.k} className={"tab"+(tab===t.k?" active":"")} onClick={()=>{setTab(t.k);setMsg(null);}}>{t.l}</div>)}</div>
      {tab==="info"&&(
        <div className="card">
          <div className="flex ic gap3" style={{marginBottom:22,paddingBottom:20,borderBottom:"1px solid var(--border)"}}>
            <div className={"av "+(currentUser.role==="Super Admin"?"av-super":currentUser.role==="Business Admin"?"av-biz":"av-sales")} style={{width:64,height:64,borderRadius:16,fontSize:26}}>{currentUser.name[0]}</div>
            <div><div style={{fontSize:20,fontWeight:800}}>{currentUser.name}</div><RoleBadge role={currentUser.role}/>{currentUser.bizName&&<div className="sm muted" style={{marginTop:4}}>🏢 {currentUser.bizName}</div>}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{l:"Full Name",v:currentUser.name},{l:"Email",v:currentUser.email},{l:"Role",v:currentUser.role},...(currentUser.bizName?[{l:"Business",v:currentUser.bizName}]:[]),...(biz?[{l:"City",v:biz.city},{l:"Industry",v:biz.industry},{l:"Phone",v:biz.phone}]:[])].map(r=>(
              <div key={r.l} style={{background:"var(--surface2)",borderRadius:10,padding:12}}>
                <div className="xs muted" style={{textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>{r.l}</div>
                <div style={{fontWeight:700,fontSize:13,wordBreak:"break-all"}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {tab==="password"&&(
        <div className="card" style={{maxWidth:420}}>
          <div className="card-title">🔑 Change Password</div>
          {isSA&&<div className="alert alert-warn">Super Admin password is set in the source code.</div>}
          {msg&&<div className={"alert "+(msg.t==="ok"?"alert-ok":"alert-err")}>{msg.t==="ok"?"✅":"⚠️"} {msg.m}</div>}
          <div className="form-group" style={{marginBottom:12}}><label>Current Password</label><div className="input-wrap"><input type={show?"text":"password"} placeholder="Your current password" value={pf.curr} onChange={e=>setPf(p=>({...p,curr:e.target.value}))} style={{paddingRight:42}} disabled={isSA}/><span className="input-icon" onClick={()=>setShow(!show)}>{show?"🙈":"👁️"}</span></div></div>
          <div className="form-group" style={{marginBottom:12}}><label>New Password</label><input type="password" placeholder="Min 6 characters" value={pf.np} onChange={e=>setPf(p=>({...p,np:e.target.value}))} disabled={isSA}/></div>
          <div className="form-group" style={{marginBottom:16}}><label>Confirm New Password</label><input type="password" placeholder="Repeat new password" value={pf.cp} onChange={e=>setPf(p=>({...p,cp:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&changePw()} disabled={isSA}/></div>
          <button className="btn btn-primary w-full" onClick={changePw} disabled={isSA}>Update Password</button>
        </div>
      )}
    </div>
  );
}

// ── LEAD DETAIL MODAL ────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function LeadDetailModal({lead,leads,setLeads,close,users,openWA,currentUser,stages,sc}){
  const myStages=stages||DEFAULT_STAGES;
  const mySC=sc||DEFAULT_SC;
  const [tab,setTab]=useState("timeline");
  const [edit,setEdit]=useState(false);
  const [f,setF]=useState({...lead});
  const [note,setNote]=useState("");
  const [callNote,setCallNote]=useState("");
  const [callMethod,setCallMethod]=useState("Call");
  const [callType,setCallType]=useState("Outgoing");
  const [sending,setSending]=useState(null);
  const [sendLog,setSendLog]=useState([]);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{setLeads(p=>p.map(l=>l.id===lead.id?{...l,...f}:l));setEdit(false);};
  const addNote=()=>{
    if(!note.trim())return;
    const entry={id:Date.now(),type:"note",text:note,date:new Date().toISOString().split("T")[0],time:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})};
    setLeads(p=>p.map(l=>l.id===lead.id?{...l,notes:[...(l.notes||[]),{text:note,date:new Date().toISOString().split("T")[0]}],timeline:[...(l.timeline||[]),entry]}:l));
    setNote("");
  };
  const addCall=()=>{
    const now=new Date();
    const callEntry={id:Date.now(),type:"call",method:callMethod,direction:callType,outcome:callNote||"Discussed",date:now.toISOString().split("T")[0],time:now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})};
    setLeads(p=>p.map(l=>l.id===lead.id?{...l,calls:[...(l.calls||[]),{type:callType,duration:"",outcome:callNote||"Discussed",method:callMethod,date:now.toISOString().split("T")[0]}],timeline:[...(l.timeline||[]),callEntry]}:l));
    setCallNote("");
  };
  const assignee=users.find(u=>u.id===lead.assignedTo);

  // Build unified timeline
  const allEvents=(()=>{
    const evts=[];
    evts.push({id:"created",type:"created",text:"Lead created · "+lead.source,date:lead.createdAt||"",time:""});
    if(lead.contactMethod)evts.push({id:"cm",type:"contact",text:"First contacted via "+lead.contactMethod,date:lead.createdAt||"",time:""});
    (lead.timeline||[]).forEach(e=>evts.push(e));
    // include legacy notes/calls not already in timeline
    (lead.notes||[]).forEach((n,i)=>{if(!(lead.timeline||[]).find(t=>t.text===n.text))evts.push({id:"ln"+i,type:"note",text:n.text,date:n.date,time:""}); });
    (lead.calls||[]).forEach((c,i)=>{if(!(lead.timeline||[]).find(t=>t.date===c.date&&t.outcome===c.outcome))evts.push({id:"lc"+i,type:"call",method:c.method||"Call",direction:c.type,outcome:c.outcome,date:c.date,time:""});});
    if(lead.followUp)evts.push({id:"fu",type:"followup",text:"Follow-up scheduled: "+lead.followUp,date:lead.followUp,time:""});
    return evts.sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  })();
  const TL_COLORS={created:"var(--green)",note:"var(--yellow)",call:"var(--accent)",contact:"var(--purple)",followup:"var(--orange)",send:"var(--pink)",default:"var(--text3)"};
  const TL_ICONS={created:"🟢",note:"📝",call:"📞",contact:"📱",followup:"🗓",send:"🚀"};

  const cfg=LS.get("flm_setup_"+currentUser.bizId,{});
  // Multi-PDF & multi-draft support
  const extraPdfs=cfg.extraPdfs||[];
  const extraDrafts=cfg.extraDrafts||[];
  const replacePlaceholders=(text)=>(text||"").replace(/{{name}}/g,lead.name||"").replace(/{{phone}}/g,lead.phone||"").replace(/{{company}}/g,lead.campaign||lead.source||"").replace(/{{city}}/g,"");

  const doSend=async(type)=>{
    const keyMap={proposal:{email:"emailCoverProposal",wa:"waCoverProposal",subj:"emailSubjectProposal"},fu1:{email:"emailCoverFollowup1",wa:"waCoverFollowup1",subj:"emailSubjectFollowup1"},fu2:{email:"emailCoverFollowup2",wa:"waCoverFollowup2",subj:"emailSubjectFollowup2"},fu3:{email:"emailCoverFollowup3",wa:"waCoverFollowup3",subj:"emailSubjectFollowup3"}};
    const keys=keyMap[type];
    setSending(type);
    const results=[];

    // Send Email via Brevo
    if(cfg.brevoApiKey&&cfg.fromEmail&&lead.email&&cfg[keys.email]){
      try{
        const subjText=replacePlaceholders(cfg[keys.subj])||("Message from "+(cfg.bizName||"us"));
        const bodyHtml="<p>"+replacePlaceholders(cfg[keys.email]).replace(/\n/g,"<br/>")+"</p>";
        const payload={sender:{name:cfg.fromName||cfg.bizName||"CRM",email:cfg.fromEmail},to:[{email:lead.email,name:lead.name}],subject:subjText,htmlContent:bodyHtml};
        if(type==="proposal"&&cfg.proposalPdfData){payload.attachment=[{content:cfg.proposalPdfData.split(",")[1],name:cfg.proposalPdfName}];}
        const res=await fetch("https://api.brevo.com/v3/smtp/email",{method:"POST",headers:{"api-key":cfg.brevoApiKey,"Content-Type":"application/json"},body:JSON.stringify(payload)});
        results.push(res.ok?"📧 Email sent ✅":"📧 Email failed ❌");
      }catch(e){results.push("📧 Email error: "+e.message);}
    } else if(!lead.email){results.push("📧 Email skipped — no email for this lead");}
    else if(!cfg.brevoApiKey){results.push("📧 Email skipped — Brevo not configured");}

    // Send WhatsApp via MSG91
    if(cfg.msg91AuthKey&&cfg.msg91SenderId&&cfg[keys.wa]){
      try{
        const waMsg=replacePlaceholders(cfg[keys.wa]);
        const tplKey=type==="proposal"?"waTemplatePropName":("waTemplate"+type.toUpperCase());
        const flowId=cfg[tplKey]||"";
        const waPayload={flow_id:flowId,sender:cfg.msg91SenderId,mobiles:"91"+lead.phone,VAR1:lead.name,VAR2:waMsg};
        const res=await fetch("https://api.msg91.com/api/v5/flow/",{method:"POST",headers:{authkey:cfg.msg91AuthKey,"Content-Type":"application/json"},body:JSON.stringify(waPayload)});
        results.push(res.ok?"💬 WhatsApp sent ✅":"💬 WhatsApp failed ❌");
      }catch(e){results.push("💬 WhatsApp error: "+e.message);}
    } else if(!cfg.msg91AuthKey){results.push("💬 WhatsApp skipped — MSG91 not configured");}

    // Log to lead timeline
    const typeLabel=type==="proposal"?"Proposal":type==="fu1"?"Follow-up 1":type==="fu2"?"Follow-up 2":"Follow-up 3";
    const logEntry={text:"Sent "+typeLabel+": "+results.join(" | "),date:new Date().toISOString().split("T")[0]};
    setLeads(p=>p.map(l=>l.id===lead.id?{...l,notes:[...(l.notes||[]),logEntry]}:l));
    setSendLog(results);
    setSending(null);
  };
  return (
    <div className="overlay" onClick={close}>
      <div className="modal" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>
        <div className="modal-hd">
          <div><div className="modal-title">{lead.name}</div><div className="mono xs muted" style={{marginTop:3}}>{lead.phone}{lead.email?" · "+lead.email:""}</div></div>
          <div className="flex gap2">
            <button className="btn btn-success btn-sm" onClick={e=>openWA(lead.phone,e)}>💬 WA</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEdit(!edit)}>{edit?"✕":"✏️ Edit"}</button>
            <button className="btn btn-ghost btn-sm" onClick={close}>✕</button>
          </div>
        </div>
        <div className="modal-bd">
          {!edit&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:12}}>
                <div style={{background:"var(--surface2)",borderRadius:9,padding:"8px 10px"}}><div className="xs muted" style={{marginBottom:3}}>STAGE</div><StageBadge stage={lead.stage}/></div>
                <div style={{background:"var(--surface2)",borderRadius:9,padding:"8px 10px"}}><div className="xs muted" style={{marginBottom:3}}>VALUE</div><div style={{fontWeight:800,color:"var(--green)",fontFamily:"var(--mono)",fontSize:14}}>{fmt(lead.value||0)}</div></div>
                <div style={{background:"var(--surface2)",borderRadius:9,padding:"8px 10px"}}><div className="xs muted" style={{marginBottom:3}}>FOLLOW-UP</div><div style={{fontWeight:700,color:lead.followUp?"var(--yellow)":"var(--text3)",fontSize:12}}>{lead.followUp||"Not set"}</div></div>
                <div style={{background:"var(--surface2)",borderRadius:9,padding:"8px 10px"}}><div className="xs muted" style={{marginBottom:3}}>CONTACTED</div><div style={{fontWeight:700,fontSize:12,color:lead.contactMethod?"var(--purple)":"var(--text3)"}}>{lead.contactMethod||"Not set"}</div></div>
              </div>
              <div className="flex gap2" style={{marginBottom:12,flexWrap:"wrap"}}>
                <span className="tag tag-blue">{lead.source}</span>
                {lead.campaign&&<span className="tag tag-gray">{lead.campaign}</span>}
                <span className="tag tag-purple">👤 {assignee?assignee.name:"Unassigned"}</span>
              </div>
            </>
          )}
          {edit&&(
            <div style={{marginBottom:14}}>
              <div className="form-grid">
                <div className="form-group"><label>Name</label><input type="text" value={f.name} onChange={e=>upd("name",e.target.value)}/></div>
                <div className="form-group"><label>Phone</label><input type="tel" value={f.phone} onChange={e=>upd("phone",e.target.value)}/></div>
                <div className="form-group"><label>Email</label><input type="email" value={f.email||""} onChange={e=>upd("email",e.target.value)}/></div>
                <div className="form-group"><label>Value (₹)</label><input type="number" value={f.value||0} onChange={e=>upd("value",Number(e.target.value))}/></div>
                <div className="form-group"><label>Stage</label><select value={f.stage} onChange={e=>upd("stage",e.target.value)}>{myStages.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="form-group"><label>Contacted Via</label><select value={f.contactMethod||""} onChange={e=>upd("contactMethod",e.target.value)}><option value="">Not contacted yet</option>{CONTACT_METHODS.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="form-group"><label>Source</label><select value={f.source} onChange={e=>upd("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="form-group"><label>Assign To</label><select value={f.assignedTo||""} onChange={e=>upd("assignedTo",e.target.value)}><option value="">Unassigned</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                <div className="form-group"><label>Campaign / Company</label><input type="text" value={f.campaign||""} onChange={e=>upd("campaign",e.target.value)}/></div>
                <div className="form-group"><label>Follow-up Date</label><input type="date" value={f.followUp||""} onChange={e=>upd("followUp",e.target.value)}/></div>
              </div>
              <div className="flex gap2" style={{justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setEdit(false)}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Changes</button></div>
              <div className="divider"/>
            </div>
          )}
          <div className="tabs" style={{overflowX:"auto"}}>
            {[{k:"timeline",l:"📅 Timeline"},{k:"activity",l:"✍️ Log"},{k:"send",l:"🚀 Send"},{k:"followup",l:"🗓 Follow-up"}].map(t=><div key={t.k} className={"tab"+(tab===t.k?" active":"")} onClick={()=>setTab(t.k)}>{t.l}</div>)}
          </div>

          {/* ── TIMELINE ── */}
          {tab==="timeline"&&(
            <div style={{position:"relative",paddingLeft:24}}>
              {/* vertical line */}
              <div style={{position:"absolute",left:7,top:8,bottom:8,width:2,background:"var(--border)",borderRadius:2}}/>
              {allEvents.length===0&&<div className="muted sm" style={{paddingLeft:8}}>No activity yet.</div>}
              {allEvents.map((ev,i)=>{
                const color=TL_COLORS[ev.type]||TL_COLORS.default;
                const icon=TL_ICONS[ev.type]||"●";
                let label="";
                if(ev.type==="created")label=ev.text;
                else if(ev.type==="note")label="📝 "+ev.text;
                else if(ev.type==="call")label=(ev.method||"📞")+" "+ev.direction+" — "+(ev.outcome||"");
                else if(ev.type==="contact")label="📱 "+ev.text;
                else if(ev.type==="followup")label="🗓 "+ev.text;
                else if(ev.type==="send")label="🚀 "+ev.text;
                else label=ev.text||"";
                return (
                  <div key={ev.id||i} style={{display:"flex",gap:10,marginBottom:14,alignItems:"flex-start"}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:color,flexShrink:0,marginTop:2,zIndex:1,boxShadow:"0 0 0 3px var(--bg)"}}/>
                    <div style={{flex:1}}>
                      <div className="sm" style={{fontWeight:600}}>{label}</div>
                      <div className="xs muted mono">{ev.date}{ev.time?" · "+ev.time:""}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── LOG ACTIVITY ── */}
          {tab==="activity"&&(
            <div>
              <div style={{marginBottom:18}}>
                <div style={{fontWeight:700,fontSize:12,color:"var(--text2)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>📝 Add Note</div>
                <div className="flex gap2">
                  <input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="Type note and press Add..." style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&addNote()}/>
                  <button className="btn btn-primary btn-sm" onClick={addNote}>+ Add</button>
                </div>
              </div>
              <div style={{borderTop:"1px solid var(--border)",paddingTop:16,marginBottom:18}}>
                <div style={{fontWeight:700,fontSize:12,color:"var(--text2)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>📞 Log Contact</div>
                <div className="form-grid" style={{marginBottom:8}}>
                  <div className="form-group"><label>Method</label><select value={callMethod} onChange={e=>setCallMethod(e.target.value)}>{CONTACT_METHODS.map(m=><option key={m}>{m}</option>)}</select></div>
                  <div className="form-group"><label>Direction</label><select value={callType} onChange={e=>setCallType(e.target.value)}><option>Outgoing</option><option>Incoming</option></select></div>
                  <div className="form-group full"><label>Outcome / Notes</label><input type="text" value={callNote} onChange={e=>setCallNote(e.target.value)} placeholder="e.g. Interested, will call back tomorrow" onKeyDown={e=>e.key==="Enter"&&addCall()}/></div>
                </div>
                <button className="btn btn-primary btn-sm" onClick={addCall}>Log Contact</button>
              </div>
            </div>
          )}
          {tab==="followup"&&(
            <div>
              <div className="form-group" style={{maxWidth:280,marginBottom:14}}><label>📅 Follow-up Date</label><input type="date" value={f.followUp||""} onChange={e=>{upd("followUp",e.target.value);setLeads(p=>p.map(l=>l.id===lead.id?{...l,followUp:e.target.value}:l));}}/></div>
              {f.followUp&&<div className="alert alert-warn" style={{maxWidth:280,marginBottom:10}}>📅 Follow-up set: <strong>{f.followUp}</strong></div>}
              {f.followUp&&<button className="btn btn-danger btn-sm" onClick={()=>{upd("followUp","");setLeads(p=>p.map(l=>l.id===lead.id?{...l,followUp:""}:l));}}>🗑 Clear</button>}
            </div>
          )}
          {tab==="send"&&(
            <div>
              {sendLog.length>0&&<div className="alert alert-ok" style={{marginBottom:14}}>{sendLog.map((r,i)=><div key={i}>{r}</div>)}</div>}
              <div className="xs muted" style={{marginBottom:12}}>To: <strong>{lead.name}</strong> · 📱 {lead.phone}{lead.email?" · 📧 "+lead.email:""}</div>

              {/* Standard sequences */}
              <div style={{fontWeight:700,fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Standard Sequences</div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {[
                  {type:"proposal",label:"📄 Proposal",sub:"Main proposal + PDF",color:"var(--accent)"},
                  {type:"fu1",label:"📩 Follow-up 1",sub:"First follow-up",color:"var(--green)"},
                  {type:"fu2",label:"📩 Follow-up 2",sub:"Second follow-up",color:"var(--yellow)"},
                  {type:"fu3",label:"📩 Follow-up 3",sub:"Third follow-up",color:"var(--orange)"},
                ].map(s=>(
                  <div key={s.type} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:130}}>
                      <div style={{fontWeight:700,fontSize:12,color:s.color}}>{s.label}</div>
                      <div className="xs muted">{s.sub}</div>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <button className="btn btn-ghost btn-sm" style={{color:"#25d366",borderColor:"rgba(37,211,102,.3)"}} onClick={()=>{
                        const bizCfg=LS.get("flm_setup_"+currentUser.bizId,{});
                        const waKeys={proposal:"waCoverProposal",fu1:"waCoverFollowup1",fu2:"waCoverFollowup2",fu3:"waCoverFollowup3"};
                        const tmpl=(bizCfg[waKeys[s.type]]||"Hi "+lead.name+"! This is "+(bizCfg.bizName||"us")+". We would like to connect.");
                        const msg=tmpl.replace(/{{name}}/g,lead.name||"").replace(/{{phone}}/g,lead.phone||"").replace(/{{company}}/g,lead.campaign||"").replace(/{{city}}/g,"");
                        window.open("https://wa.me/91"+lead.phone+"?text="+encodeURIComponent(msg),"_blank");
                      }}>💬 WA</button>
                      <button className="btn btn-primary btn-sm" disabled={sending===s.type} onClick={()=>doSend(s.type)}>{sending===s.type?"Sending...":"🚀 Email+WA"}</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* Extra PDFs */}
              {extraPdfs.length>0&&(
                <div style={{marginBottom:16}}>
                  <div style={{fontWeight:700,fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>📎 Extra Documents</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {extraPdfs.map((pdf,i)=>(
                      <div key={i} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,padding:"9px 12px",display:"flex",alignItems:"center",gap:10}}>
                        <span>📄</span>
                        <div style={{flex:1,fontSize:12,fontWeight:600}}>{pdf.name}</div>
                        <button className="btn btn-ghost btn-sm" onClick={()=>{const a=document.createElement("a");a.href=pdf.data;a.download=pdf.name;a.click();}}>⬇️ Download</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Extra Email Drafts */}
              {extraDrafts.length>0&&(
                <div style={{marginBottom:16}}>
                  <div style={{fontWeight:700,fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>✉️ Quick Email Drafts</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {extraDrafts.map((draft,i)=>{
                      const body=replacePlaceholders(draft.body);
                      const subj=replacePlaceholders(draft.subject);
                      return (
                        <div key={i} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,padding:"9px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                          <div style={{flex:1,minWidth:130}}>
                            <div style={{fontSize:12,fontWeight:700}}>{draft.name}</div>
                            <div className="xs muted">{draft.subject}</div>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            {lead.email&&<a href={"mailto:"+lead.email+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body)} className="btn btn-ghost btn-sm">📧 Open Draft</a>}
                            <button className="btn btn-ghost btn-sm" style={{color:"#25d366"}} onClick={()=>window.open("https://wa.me/91"+lead.phone+"?text="+encodeURIComponent(body),"_blank")}>💬 WA</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div className="alert alert-warn">⚠️ Configure Email (Brevo) + WhatsApp (MSG91) in <strong>Setup</strong> to enable automated sending.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SETUP PAGE ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function SetupPage({currentUser,bizStages,setBizStages}){
  const bizId=currentUser.bizId;
  const SK="flm_setup_"+bizId;
  const [cfg,setCfg]=useState(()=>LS.get(SK,{logo:"",bizName:"",emailProvider:"brevo",brevoApiKey:"",fromEmail:"",fromName:"",msg91AuthKey:"",msg91SenderId:"",waTemplatePropName:"",waTemplateFollowup1:"",waTemplateFollowup2:"",waTemplateFollowup3:"",proposalPdfName:"",proposalPdfData:"",emailCoverProposal:"",emailCoverFollowup1:"",emailCoverFollowup2:"",emailCoverFollowup3:"",waCoverProposal:"",waCoverFollowup1:"",waCoverFollowup2:"",waCoverFollowup3:"",extraPdfs:[],extraDrafts:[]}));
  const [tab,setTab]=useState("branding");
  const [saved,setSaved]=useState(false);
  const logoRef=useRef();
  const pdfRef=useRef();
  const extraPdfRef=useRef();

  // Stage manager state
  const [stages,setStages]=useState(bizStages||DEFAULT_STAGES);
  const [newStageName,setNewStageName]=useState("");
  const [insertAfterIdx,setInsertAfterIdx]=useState(0);
  const [renameIdx,setRenameIdx]=useState(null);
  const [renameName,setRenameName]=useState("");
  const [stageMsg,setStageMsg]=useState(null);

  // Extra drafts state
  const [editDraftIdx,setEditDraftIdx]=useState(null);
  const [draftForm,setDraftForm]=useState({name:"",subject:"",body:""});

  const set=(k,v)=>setCfg(p=>({...p,[k]:v}));
  const save=()=>{LS.set(SK,cfg);setSaved(true);setTimeout(()=>setSaved(false),2500);};

  const uploadLogo=(file)=>{const r=new FileReader();r.onload=e=>set("logo",e.target.result);r.readAsDataURL(file);};
  const uploadPdf=(file)=>{
    if(file.size>5*1024*1024){alert("PDF must be under 5MB");return;}
    const r=new FileReader();
    r.onload=e=>setCfg(p=>({...p,proposalPdfName:file.name,proposalPdfData:e.target.result}));
    r.readAsDataURL(file);
  };
  const uploadExtraPdf=(file)=>{
    if(file.size>5*1024*1024){alert("PDF must be under 5MB");return;}
    const r=new FileReader();
    r.onload=e=>{const newPdf={name:file.name,data:e.target.result};setCfg(p=>({...p,extraPdfs:[...(p.extraPdfs||[]),newPdf]}));};
    r.readAsDataURL(file);
  };

  // Stage operations
  const saveStages=(s)=>{setStages(s);setBizStages(s);setStageMsg({t:"ok",m:"Stages saved!"});setTimeout(()=>setStageMsg(null),2000);};
  const addStage=()=>{
    if(!newStageName.trim()){setStageMsg({t:"err",m:"Enter a stage name."});return;}
    if(stages.includes(newStageName.trim())){setStageMsg({t:"err",m:"Stage already exists."});return;}
    const ns=[...stages];ns.splice(insertAfterIdx+1,0,newStageName.trim());
    saveStages(ns);setNewStageName("");
  };
  const deleteStage=(idx,allLeads)=>{
    const stage=stages[idx];
    // check if any leads are in this stage — passed via bizId scan
    const leadsInStage=(LS.get("flm_leads",[])||[]).filter(l=>l.bizId===bizId&&l.stage===stage);
    if(leadsInStage.length>0){setStageMsg({t:"err",m:"Cannot delete: "+leadsInStage.length+" lead(s) are in '"+stage+"'. Move them first."});return;}
    const ns=stages.filter((_,i)=>i!==idx);saveStages(ns);
  };
  const applyRename=()=>{
    if(!renameName.trim()){return;}
    // Also update leads with old stage name
    const oldName=stages[renameIdx];
    const allLeads=LS.get("flm_leads",[]);
    LS.set("flm_leads",allLeads.map(l=>l.bizId===bizId&&l.stage===oldName?{...l,stage:renameName.trim()}:l));
    const ns=stages.map((s,i)=>i===renameIdx?renameName.trim():s);
    saveStages(ns);setRenameIdx(null);setRenameName("");
  };

  const TABS=[{k:"branding",l:"🎨 Branding"},{k:"stages",l:"🗂 Stages"},{k:"gsheets",l:"📊 Google Sheets"},{k:"email",l:"📧 Email"},{k:"whatsapp",l:"💬 WhatsApp"},{k:"pdfs",l:"📄 Documents"},{k:"sequences",l:"✉️ Templates"}];

  return (
    <div style={{maxWidth:780}}>
      <div className="alert alert-info" style={{marginBottom:16}}>🔧 <strong>Setup your integrations once</strong> — then send personalised proposals and follow-ups from every lead's profile.</div>
      <div className="tabs" style={{marginBottom:0,overflowX:"auto"}}>{TABS.map(t=><div key={t.k} className={"tab"+(tab===t.k?" active":"")} onClick={()=>setTab(t.k)}>{t.l}</div>)}</div>
      <div className="card" style={{borderRadius:"0 0 14px 14px",borderTop:"none"}}>
        {saved&&<div className="alert alert-ok" style={{marginBottom:14}}>✅ Settings saved!</div>}

        {/* ── BRANDING ── */}
        {tab==="branding"&&(
          <div>
            <div className="card-title">🎨 Business Branding</div>
            <div className="form-group" style={{marginBottom:14}}><label>Business Name (shown in emails & WA)</label><input type="text" placeholder="Sharma Salon & Spa" value={cfg.bizName} onChange={e=>set("bizName",e.target.value)}/></div>
            <div className="form-group" style={{marginBottom:14}}>
              <label>Upload Logo (PNG/JPG)</label>
              <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                {cfg.logo&&<img src={cfg.logo} alt="logo" style={{height:60,borderRadius:8,border:"1px solid var(--border)",background:"white",padding:4}}/>}
                <button className="btn btn-ghost" onClick={()=>logoRef.current.click()}>📁 {cfg.logo?"Change":"Upload Logo"}</button>
                {cfg.logo&&<button className="btn btn-danger btn-sm" onClick={()=>set("logo","")}>Remove</button>}
                <input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadLogo(e.target.files[0])}/>
              </div>
            </div>
          </div>
        )}

        {/* ── STAGE MANAGER ── */}
        {tab==="stages"&&(
          <div>
            <div className="card-title">🗂 Pipeline Stage Manager</div>
            <p className="sm muted" style={{marginBottom:16}}>These are your pipeline stages. You can add new stages between existing ones, rename them, or delete empty ones. Pre-made stages cannot be deleted if leads are inside.</p>
            {stageMsg&&<div className={"alert "+(stageMsg.t==="ok"?"alert-ok":"alert-err")} style={{marginBottom:12}}>{stageMsg.t==="ok"?"✅":"⚠️"} {stageMsg.m}</div>}
            <div style={{marginBottom:20}}>
              {stages.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"var(--surface2)",borderRadius:9,marginBottom:6,border:"1px solid var(--border)"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:DEFAULT_SC[s]||STAGE_PALETTE[i%STAGE_PALETTE.length],flexShrink:0}}/>
                  {renameIdx===i?(
                    <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                      <input type="text" value={renameName} onChange={e=>setRenameName(e.target.value)} style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&applyRename()} autoFocus/>
                      <button className="btn btn-primary btn-sm" onClick={applyRename}>✓ Save</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setRenameIdx(null)}>✕</button>
                    </div>
                  ):(
                    <>
                      <span style={{flex:1,fontWeight:600,fontSize:13}}>{s}</span>
                      <span className="xs muted" style={{marginRight:4}}>#{i+1}</span>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setRenameIdx(i);setRenameName(s);}}>✏️ Rename</button>
                      {!DEFAULT_STAGES.includes(s)&&<button className="btn btn-danger btn-sm" onClick={()=>deleteStage(i)}>🗑</button>}
                      {DEFAULT_STAGES.includes(s)&&<span className="xs muted" style={{background:"var(--surface3)",borderRadius:5,padding:"2px 6px"}}>default</span>}
                    </>
                  )}
                </div>
              ))}
            </div>
            <div style={{background:"var(--surface2)",borderRadius:12,padding:16,border:"1px solid var(--border)"}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:"var(--text2)"}}>➕ Add New Stage</div>
              <div className="form-grid">
                <div className="form-group"><label>New Stage Name</label><input type="text" placeholder="e.g. Negotiation" value={newStageName} onChange={e=>setNewStageName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addStage()}/></div>
                <div className="form-group"><label>Insert After</label>
                  <select value={insertAfterIdx} onChange={e=>setInsertAfterIdx(Number(e.target.value))}>
                    {stages.map((s,i)=><option key={i} value={i}>{s}</option>)}
                  </select>
                </div>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addStage}>+ Add Stage</button>
            </div>
          </div>
        )}

        {/* ── GOOGLE SHEETS / AUTO-IMPORT ── */}
        {tab==="gsheets"&&(
          <div>
            <div className="card-title">📊 Google Sheets Auto-Import</div>
            <div className="alert alert-info" style={{marginBottom:16}}>
              Connect your Facebook / Google Ads lead sheet so new leads are pulled in automatically each time you click <strong>Sync Now</strong>. This uses Google Sheets' public CSV export — no coding needed.
            </div>

            <div style={{marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:13,color:"var(--accent)",marginBottom:12}}>📋 Step-by-step setup guide</div>
              {[
                {n:"1",title:"Connect Facebook/Google Ads → Google Sheets",body:"Use a free tool called LeadsBridge, Zapier, or the native Meta Leads Center export to automatically push every new ad lead into a Google Sheet. The sheet will have columns: id, created_time, ad_name, campaign_name, platform, full_name, phone_number, email, company_name, what_is_your_role_in_the_business?, how_many_branches_do_you_operate?, are_you_using_any_software_?, lead_status, website, Notes"},
                {n:"2",title:"Make the Google Sheet publicly readable",body:"Open your Google Sheet → click Share (top right) → under General Access select 'Anyone with the link' → set role to Viewer → click Done. This lets the CRM read rows without login."},
                {n:"3",title:"Copy the Sheet ID from the URL",body:"Your Sheet URL looks like: https://docs.google.com/spreadsheets/d/SHEET_ID_HERE/edit\nCopy the long ID between /d/ and /edit — paste it in the field below."},
                {n:"4",title:"Enter Sheet name (tab name)",body:"At the bottom of your Google Sheet you'll see tabs like 'Sheet1' or 'Facebook Leads'. Enter the exact tab name below (case-sensitive)."},
                {n:"5",title:"Click Sync Now",body:"Come back to your CRM dashboard any time and click Sync Now. New rows (not already imported) will be added as leads automatically. The CRM checks the 'id' column to avoid duplicates."},
              ].map(step=>(
                <div key={step.n} style={{display:"flex",gap:12,marginBottom:14,padding:"12px 14px",background:"var(--surface2)",borderRadius:10,border:"1px solid var(--border)"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"var(--accent)",color:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{step.n}</div>
                  <div><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{step.title}</div><div className="sm muted" style={{whiteSpace:"pre-line"}}>{step.body}</div></div>
                </div>
              ))}
            </div>

            <div style={{borderTop:"1px solid var(--border)",paddingTop:18,marginBottom:4}}>
              <div style={{fontWeight:800,fontSize:13,marginBottom:12}}>⚙️ Your Sheet Configuration</div>
              <div className="form-grid">
                <div className="form-group full">
                  <label>Google Sheet ID <span className="xs muted">(from the URL)</span></label>
                  <input type="text" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" value={cfg.gSheetId||""} onChange={e=>set("gSheetId",e.target.value)}/>
                  <div className="xs muted" style={{marginTop:4}}>Found in: docs.google.com/spreadsheets/d/<strong style={{color:"var(--accent)"}}>THIS_PART</strong>/edit</div>
                </div>
                <div className="form-group">
                  <label>Sheet Tab Name <span className="xs muted">(exact, case-sensitive)</span></label>
                  <input type="text" placeholder="Sheet1" value={cfg.gSheetTab||""} onChange={e=>set("gSheetTab",e.target.value)}/>
                </div>
                <div className="form-group">
                  <label>Default Stage for imported leads</label>
                  <select value={cfg.gSheetStage||"New Lead"} onChange={e=>set("gSheetStage",e.target.value)}>
                    {(bizStages||DEFAULT_STAGES).map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Auto-assign to user</label>
                  <select value={cfg.gSheetAssignTo||""} onChange={e=>set("gSheetAssignTo",e.target.value)}>
                    <option value="">Unassigned (round-robin)</option>
                    {(LS.get("flm_users",[])||[]).filter(u=>u.bizId===bizId).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>
              </div>
            </div>

            <div style={{background:"var(--surface2)",borderRadius:10,padding:14,marginBottom:16,border:"1px solid var(--border)"}}>
              <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:"var(--text2)"}}>📐 Expected Column Mapping</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 16px"}}>
                {[
                  ["full_name","→ Lead Name"],["phone_number","→ Phone"],["email","→ Email"],
                  ["company_name","→ Company"],["platform","→ Source (Facebook/Google)"],
                  ["campaign_name","→ Campaign"],["ad_name","→ Ad Name (saved in notes)"],
                  ["lead_status","→ Status tag"],["website","→ Website"],
                  ["what_is_your_role_in_the_business?","→ Saved in notes"],
                  ["how_many_branches_do_you_operate?","→ Saved in notes"],
                  ["are_you_using_any_software_?","→ Saved in notes"],
                  ["Notes","→ Notes"],["created_time","→ Lead created date"],
                ].map(([col,maps])=>(
                  <div key={col} style={{display:"flex",gap:8,fontSize:11,padding:"3px 0"}}>
                    <span style={{fontFamily:"var(--mono)",color:"var(--accent)",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:"0 0 auto",maxWidth:"55%"}}>{col}</span>
                    <span className="muted">{maps}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="alert alert-warn" style={{marginBottom:0}}>
              ⚠️ <strong>Important:</strong> Your Google Sheet must be set to <strong>"Anyone with the link → Viewer"</strong> for sync to work. The sheet ID and tab name must match exactly. Leads with duplicate IDs are skipped automatically.
            </div>
          </div>
        )}

        {/* ── EMAIL SETUP ── */}
        {tab==="email"&&(
          <div>
            <div className="card-title">📧 Email Integration — Brevo (Free)</div>
            <div className="alert alert-info" style={{marginBottom:16}}>
              <strong>Step-by-step: Get your free Brevo API key</strong><br/>
              1. Go to <strong>brevo.com</strong> → Sign up free (300 emails/day free)<br/>
              2. Click your name top-right → <strong>SMTP &amp; API</strong> → <strong>API Keys</strong> tab<br/>
              3. Click <strong>Generate a new API key</strong> → Copy it<br/>
              4. Paste below 👇 + enter the email you want to send FROM (must be verified in Brevo)
            </div>
            <div className="form-grid">
              <div className="form-group full"><label>Brevo API Key *</label><input type="password" placeholder="xkeysib-xxxxxxxxxxxxxxxx" value={cfg.brevoApiKey} onChange={e=>set("brevoApiKey",e.target.value)}/></div>
              <div className="form-group"><label>From Email * (verified in Brevo)</label><input type="email" placeholder="hello@yourbusiness.com" value={cfg.fromEmail} onChange={e=>set("fromEmail",e.target.value)}/></div>
              <div className="form-group"><label>From Name</label><input type="text" placeholder="Riya from Sharma Salon" value={cfg.fromName} onChange={e=>set("fromName",e.target.value)}/></div>
            </div>
            <div className="alert alert-warn">💡 Brevo free plan: 300 emails/day, no credit card needed.</div>
          </div>
        )}

        {/* ── WHATSAPP ── */}
        {tab==="whatsapp"&&(
          <div>
            <div className="card-title">💬 WhatsApp Business API — MSG91</div>
            <div className="alert alert-info" style={{marginBottom:16}}>
              <strong>Step-by-step: Connect MSG91 WhatsApp API</strong><br/>
              1. Go to <strong>msg91.com</strong> → Sign up → <strong>WhatsApp</strong> section<br/>
              2. Add &amp; verify your WhatsApp Business number<br/>
              3. Create message templates (Meta approval: 1-3 days)<br/>
              4. Go to <strong>API → Auth Key</strong> → copy your key<br/>
              5. Note your <strong>Sender ID / Integrated Number</strong><br/>
              6. Paste below 👇
            </div>
            <div className="form-grid">
              <div className="form-group full"><label>MSG91 Auth Key *</label><input type="password" placeholder="xxxxxxxxxxxxxxxxx" value={cfg.msg91AuthKey} onChange={e=>set("msg91AuthKey",e.target.value)}/></div>
              <div className="form-group"><label>Sender ID / WhatsApp Number</label><input type="text" placeholder="91XXXXXXXXXX" value={cfg.msg91SenderId} onChange={e=>set("msg91SenderId",e.target.value)}/></div>
              <div className="form-group"><label>Proposal Template Name</label><input type="text" placeholder="send_proposal" value={cfg.waTemplatePropName} onChange={e=>set("waTemplatePropName",e.target.value)}/></div>
              <div className="form-group"><label>Follow-up 1 Template</label><input type="text" placeholder="followup_1" value={cfg.waTemplateFollowup1} onChange={e=>set("waTemplateFollowup1",e.target.value)}/></div>
              <div className="form-group"><label>Follow-up 2 Template</label><input type="text" placeholder="followup_2" value={cfg.waTemplateFollowup2} onChange={e=>set("waTemplateFollowup2",e.target.value)}/></div>
              <div className="form-group"><label>Follow-up 3 Template</label><input type="text" placeholder="followup_3" value={cfg.waTemplateFollowup3} onChange={e=>set("waTemplateFollowup3",e.target.value)}/></div>
            </div>
            <div className="alert alert-warn">💡 MSG91 pricing: ~₹0.30-₹0.60/message. Templates need Meta approval (1-3 days).</div>
          </div>
        )}

        {/* ── DOCUMENTS ── */}
        {tab==="pdfs"&&(
          <div>
            <div className="card-title">📄 Documents Library</div>
            <p className="sm muted" style={{marginBottom:16}}>Upload your main proposal PDF and any additional documents. All appear in the lead's Send tab for easy sharing.</p>

            {/* Main proposal */}
            <div style={{fontWeight:700,fontSize:12,color:"var(--text2)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Main Proposal PDF</div>
            <div style={{border:"2px dashed var(--border2)",borderRadius:10,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}}
              onClick={()=>pdfRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();uploadPdf(e.dataTransfer.files[0]);}}>
              {cfg.proposalPdfName?(
                <div><div style={{fontSize:28,marginBottom:4}}>📄</div><div style={{fontWeight:700,color:"var(--green)",fontSize:13}}>✅ {cfg.proposalPdfName}</div><div className="xs muted">Click to replace</div></div>
              ):(
                <div><div style={{fontSize:28,marginBottom:4}}>📁</div><div style={{fontWeight:700,fontSize:13}}>Click or drag PDF here</div><div className="xs muted" style={{marginTop:4}}>Max 5MB</div></div>
              )}
              <input ref={pdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>uploadPdf(e.target.files[0])}/>
            </div>
            {cfg.proposalPdfName&&(
              <div style={{display:"flex",gap:8,marginBottom:20}}>
                <button className="btn btn-success btn-sm" onClick={()=>{const a=document.createElement("a");a.href=cfg.proposalPdfData;a.download=cfg.proposalPdfName;a.click();}}>⬇️ Download</button>
                <button className="btn btn-danger btn-sm" onClick={()=>setCfg(p=>({...p,proposalPdfName:"",proposalPdfData:""}))}>🗑 Remove</button>
              </div>
            )}

            {/* Extra PDFs */}
            <div style={{fontWeight:700,fontSize:12,color:"var(--text2)",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>Additional Documents</div>
            {(cfg.extraPdfs||[]).map((pdf,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--surface2)",borderRadius:9,padding:"9px 12px",marginBottom:7}}>
                <span>📄</span>
                <div style={{flex:1,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pdf.name}</div>
                <button className="btn btn-ghost btn-sm" onClick={()=>{const a=document.createElement("a");a.href=pdf.data;a.download=pdf.name;a.click();}}>⬇️</button>
                <button className="btn btn-danger btn-sm" onClick={()=>setCfg(p=>({...p,extraPdfs:(p.extraPdfs||[]).filter((_,j)=>j!==i)}))}>🗑</button>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>extraPdfRef.current.click()}>📁 + Upload Additional PDF</button>
            <input ref={extraPdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>uploadExtraPdf(e.target.files[0])}/>
          </div>
        )}

        {/* ── MESSAGE TEMPLATES ── */}
        {tab==="sequences"&&(
          <div>
            <div className="card-title">✉️ Message Templates</div>
            <div className="alert alert-info" style={{marginBottom:14}}>Use <strong>{"{{name}}"}</strong>, <strong>{"{{company}}"}</strong>, <strong>{"{{phone}}"}</strong> as placeholders — replaced with each lead's data when sending.</div>

            {/* Standard sequences */}
            {[
              {key:"Proposal",emailKey:"emailCoverProposal",waKey:"waCoverProposal",label:"📄 Proposal",color:"var(--accent)"},
              {key:"Followup1",emailKey:"emailCoverFollowup1",waKey:"waCoverFollowup1",label:"📩 Follow-up 1",color:"var(--green)"},
              {key:"Followup2",emailKey:"emailCoverFollowup2",waKey:"waCoverFollowup2",label:"📩 Follow-up 2",color:"var(--yellow)"},
              {key:"Followup3",emailKey:"emailCoverFollowup3",waKey:"waCoverFollowup3",label:"📩 Follow-up 3",color:"var(--orange)"},
            ].map(seq=>(
              <div key={seq.key} style={{marginBottom:18,borderBottom:"1px solid var(--border)",paddingBottom:18}}>
                <div style={{fontWeight:800,fontSize:12,color:seq.color,marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>{seq.label}</div>
                <div className="form-grid">
                  <div className="form-group"><label>📧 Email Subject</label><input type="text" placeholder="Your proposal is ready, {{name}}!" value={cfg["emailSubject"+seq.key]||""} onChange={e=>set("emailSubject"+seq.key,e.target.value)}/></div>
                  <div className="form-group full"><label>📧 Email Body</label><textarea rows={3} placeholder={"Hi {{name}},\n\nPlease find your personalised proposal attached.\n\nBest,\n"+(cfg.fromName||cfg.bizName||"Your Team")} value={cfg[seq.emailKey]||""} onChange={e=>set(seq.emailKey,e.target.value)}/></div>
                  <div className="form-group full"><label>💬 WhatsApp Message</label><textarea rows={2} placeholder={"Hi {{name}}! 👋 This is "+(cfg.bizName||"us")+". Here is your proposal..."} value={cfg[seq.waKey]||""} onChange={e=>set(seq.waKey,e.target.value)}/></div>
                </div>
              </div>
            ))}

            {/* Extra email drafts */}
            <div style={{fontWeight:700,fontSize:12,color:"var(--text2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>📋 Extra Email Drafts</div>
            {(cfg.extraDrafts||[]).map((draft,i)=>(
              <div key={i} style={{background:"var(--surface2)",borderRadius:9,padding:"10px 12px",marginBottom:8,border:"1px solid var(--border)"}}>
                {editDraftIdx===i?(
                  <div>
                    <div className="form-grid">
                      <div className="form-group"><label>Draft Name</label><input type="text" value={draftForm.name} onChange={e=>setDraftForm(p=>({...p,name:e.target.value}))}/></div>
                      <div className="form-group"><label>Email Subject</label><input type="text" value={draftForm.subject} onChange={e=>setDraftForm(p=>({...p,subject:e.target.value}))}/></div>
                      <div className="form-group full"><label>Body (use {"{{name}}"}, {"{{company}}"})</label><textarea rows={3} value={draftForm.body} onChange={e=>setDraftForm(p=>({...p,body:e.target.value}))}/></div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn btn-primary btn-sm" onClick={()=>{setCfg(p=>{const d=[...(p.extraDrafts||[])];d[i]={...draftForm};return {...p,extraDrafts:d};});setEditDraftIdx(null);}}>Save</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditDraftIdx(null)}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12}}>{draft.name}</div><div className="xs muted">{draft.subject}</div></div>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setEditDraftIdx(i);setDraftForm({...draft});}}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>setCfg(p=>({...p,extraDrafts:(p.extraDrafts||[]).filter((_,j)=>j!==i)}))}>🗑</button>
                  </div>
                )}
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>{const newD={name:"Draft "+(((cfg.extraDrafts||[]).length)+1),subject:"",body:""};setCfg(p=>({...p,extraDrafts:[...(p.extraDrafts||[]),newD]}));setEditDraftIdx((cfg.extraDrafts||[]).length);setDraftForm(newD);}}>+ Add Email Draft</button>
          </div>
        )}

        <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end"}}>
          <button className="btn btn-primary" onClick={save}>💾 Save Settings</button>
        </div>
      </div>

      {/* Status bar */}
      <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
        {[
          {label:"Brevo Email",ok:!!cfg.brevoApiKey&&!!cfg.fromEmail,icon:"📧"},
          {label:"MSG91 WhatsApp",ok:!!cfg.msg91AuthKey&&!!cfg.msg91SenderId,icon:"💬"},
          {label:"Proposal PDF",ok:!!cfg.proposalPdfName,icon:"📄"},
          {label:"Logo",ok:!!cfg.logo,icon:"🎨"},
          {label:"Extra Docs",ok:(cfg.extraPdfs||[]).length>0,icon:"📎"},
          {label:"Drafts",ok:(cfg.extraDrafts||[]).length>0,icon:"✉️"},
          {label:"Custom Stages",ok:JSON.stringify(stages)!==JSON.stringify(DEFAULT_STAGES),icon:"🗂"},
        ].map(s=>(
          <div key={s.label} style={{display:"flex",alignItems:"center",gap:5,background:"var(--surface2)",border:"1px solid "+(s.ok?"rgba(16,185,129,.3)":"var(--border)"),borderRadius:8,padding:"5px 10px"}}>
            <span>{s.icon}</span><span className="xs" style={{fontWeight:700,color:s.ok?"var(--green)":"var(--text3)"}}>{s.label}</span><span style={{fontSize:10}}>{s.ok?"✅":"○"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return {error:e};}
  render(){
    if(this.state.error){
      return React.createElement('div',{style:{padding:40,color:'#ff4444',fontFamily:'monospace',background:'#1a1a1a',minHeight:'100vh'}},
        React.createElement('h2',null,'⚠️ App Error'),
        React.createElement('pre',{style:{whiteSpace:'pre-wrap',fontSize:13}},String(this.state.error))
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
