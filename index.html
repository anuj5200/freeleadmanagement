<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FreeLeadManagement CRM</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0f1623;--surface2:#162030;--surface3:#1c2a3f;
  --border:#1e2d45;--border2:#253550;
  --accent:#00d4ff;--accent2:#7c3aed;--accent3:#06b6d4;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5a72;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;--orange:#f97316;--pink:#ec4899;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
  --glow:0 0 40px rgba(0,212,255,.08);
}
body.light{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e8eef5;
  --border:#d1dce8;--border2:#b8cad9;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea,button{font-family:var(--font)}

/* ── Auth pages ────────────────────────────────── */
.auth-page{min-height:100vh;display:flex;background:var(--bg);position:relative;overflow:hidden}
.auth-left{width:420px;min-width:420px;background:linear-gradient(160deg,#0d1829 0%,#0a1220 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:40px;position:relative;overflow:hidden}
.auth-left::before{content:'';position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.06) 0%,transparent 70%)}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.auth-box{width:100%;max-width:460px}
.auth-brand{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);margin-bottom:40px}
.auth-hero{font-size:32px;font-weight:800;line-height:1.2;margin-bottom:16px}
.auth-hero span{color:var(--accent)}
.auth-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:32px}
.auth-feature{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.auth-feature-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px}
.auth-feature-text{font-size:13px;color:var(--text2)}
.auth-feature-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.auth-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px}
.auth-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:14px}
.auth-stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent)}
.auth-stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}

.auth-title{font-size:24px;font-weight:800;margin-bottom:6px}
.auth-desc{font-size:13px;color:var(--text2);margin-bottom:24px}
.auth-switch{font-size:13px;color:var(--text3);margin-top:20px;text-align:center}
.auth-switch a{color:var(--accent);cursor:pointer;font-weight:700;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}

/* ── App layout ────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono)}
.logo-biz{font-size:13px;font-weight:800;color:var(--text);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-role{font-size:10px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(0,212,255,.08);color:var(--accent);border-color:rgba(0,212,255,.15)}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--surface2);cursor:pointer;border:1px solid var(--border)}
.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0}
.av-super{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.av-biz{background:linear-gradient(135deg,#7c3aed,#06b6d4)}
.av-sales{background:linear-gradient(135deg,#10b981,#0ea5e9)}
.un{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ur{font-size:10px;color:var(--text3)}

/* ── Main ──────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{height:56px;min-height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.topbar-title{font-size:15px;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Buttons ───────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:var(--font);white-space:nowrap;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#00bde6;box-shadow:0 4px 20px rgba(0,212,255,.3)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.btn-success:hover{background:rgba(16,185,129,.2)}
.btn-warning{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.btn-purple{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-lg{padding:12px 24px;font-size:14px}
.w-full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Forms ─────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
input[type=text],input[type=email],input[type=tel],input[type=password],input[type=number],input[type=date],select,textarea{
  background:var(--surface2);border:1px solid var(--border2);border-radius:9px;
  padding:10px 14px;color:var(--text);font-size:13px;outline:none;
  transition:border-color .15s,box-shadow .15s;width:100%
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
input[type=date]{color-scheme:dark}
textarea{resize:vertical;min-height:80px}
.input-wrap{position:relative}
.input-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:15px;user-select:none;color:var(--text3)}
select option{background:var(--surface)}

/* ── Cards ─────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-title{font-size:13px;font-weight:800;margin-bottom:16px;color:var(--text)}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}

/* ── Super Admin Stat cards ──────────────────── */
.sa-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sa-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.sa-stat:hover{border-color:var(--border2)}
.sa-stat::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.015) 0%,transparent 60%);pointer-events:none}
.sa-stat-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.sa-stat-icon{font-size:22px;margin-bottom:10px}
.sa-stat-val{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1}
.sa-stat-label{font-size:11px;color:var(--text3);margin-top:5px;font-weight:600}
.sa-stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── Table ─────────────────────────────────────── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:12px 16px;font-size:13px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}

/* ── Tags ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.stage-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700}
.tag-blue{background:rgba(0,212,255,.1);color:var(--accent)}
.tag-green{background:rgba(16,185,129,.1);color:var(--green)}
.tag-red{background:rgba(239,68,68,.1);color:var(--red)}
.tag-yellow{background:rgba(245,158,11,.1);color:var(--yellow)}
.tag-purple{background:rgba(139,92,246,.1);color:var(--purple)}
.tag-gray{background:rgba(148,163,184,.08);color:var(--text2)}
.tag-orange{background:rgba(249,115,22,.1);color:var(--orange)}

/* ── Modal ─────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;border-radius:18px 18px 0 0}
.modal-title{font-size:16px;font-weight:800}
.modal-bd{padding:20px 24px}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ── Pipeline ──────────────────────────────────── */
.pipeline-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.p-col{min-width:210px;width:210px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.p-col-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.p-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
.p-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px;cursor:pointer;transition:all .15s}
.p-card:hover{border-color:var(--accent);background:var(--surface3)}

/* ── Search ────────────────────────────────────── */
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 14px 9px 36px;color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3)}
select.sel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer}

/* ── Misc ──────────────────────────────────────── */
.wa-btn{width:28px;height:28px;border-radius:7px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#25d366;transition:all .15s;flex-shrink:0;font-size:14px}
.wa-btn:hover{background:rgba(37,211,102,.2)}
.divider{height:1px;background:var(--border);margin:16px 0}
.flex{display:flex}.ic{align-items:center}.gap2{gap:8px}.gap3{gap:12px}.mla{margin-left:auto}
.mono{font-family:var(--mono)}.muted{color:var(--text3)}.sm{font-size:12px}.xs{font-size:11px}
.bold{font-weight:700}.bolder{font-weight:800}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text3);gap:10px;font-size:13px;text-align:center}
.alert{border-radius:9px;padding:10px 14px;font-size:12px;margin-bottom:14px;font-weight:600}
.alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.alert-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.alert-info{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.18);color:var(--accent)}
.alert-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--yellow)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tl-item{display:flex;gap:12px;margin-bottom:14px}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;transition:all .2s;cursor:pointer}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(0,212,255,.04)}

/* ── SA Dashboard specifics ──────────────────── */
.biz-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.biz-row:hover{background:var(--surface2)}
.biz-row:last-child{border-bottom:none}
.biz-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0;color:white}
.activity-item{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.growth-bar{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:6px}
.growth-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── Pending badge ────────────────────────── */
.pending-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--yellow)}

/* ── Mobile bottom nav ───────────────────────── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom)}
.mob-nav-items{display:flex;justify-content:space-around}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border-radius:10px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:700;min-width:48px;position:relative;transition:color .15s}
.mob-nav-item.active{color:var(--accent)}
.mob-nav-item .ni{font-size:22px;line-height:1}
.mob-badge{position:absolute;top:2px;right:6px;background:var(--yellow);color:#000;border-radius:20px;font-size:8px;font-weight:800;padding:1px 4px;min-width:14px;text-align:center}

@media(max-width:900px){
  .sa-stat-grid{grid-template-columns:1fr 1fr}
  .auth-left{display:none}
  .auth-right{padding:24px}
  .dash-grid{grid-template-columns:1fr!important}
}
@media(max-width:700px){
  .sidebar{display:none!important}
  .mob-nav{display:block}
  .app{padding-bottom:70px}
  .content{padding:14px 12px}
  .topbar{padding:0 14px;height:50px}
  .topbar-title{font-size:14px}
  .sa-stat-grid{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr!important}
  .table-wrap{overflow-x:auto}
  table{min-width:550px}
  .form-grid{grid-template-columns:1fr!important}
  .form-group.full{grid-column:1}
  .pipeline-wrap{padding-bottom:20px}
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:18px 18px 0 0;max-height:96vh;width:100%}
  .auth-right{padding:20px 16px}
  .auth-title{font-size:20px}
  .biz-row{flex-wrap:wrap}
  .sa-stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_STAGES=["New Lead","Contacted","Interested","Demo","Proposal Shared","Follow-up","Not Interested","Converted","Lost"];
const DEFAULT_SC={"New Lead":"#6366f1","Contacted":"#0ea5e9","Interested":"#f59e0b","Demo":"#8b5cf6","Proposal Shared":"#ec4899","Follow-up":"#f97316","Not Interested":"#64748b","Converted":"#10b981","Lost":"#ef4444"};
const STAGE_PALETTE=["#6366f1","#0ea5e9","#f59e0b","#8b5cf6","#ec4899","#f97316","#64748b","#10b981","#ef4444","#06b6d4","#84cc16","#d97706","#a855f7","#14b8a6"];
const STAGES=DEFAULT_STAGES;
const SC=DEFAULT_SC;
const CONTACT_METHODS=["WhatsApp","Call","Email","SMS","In-Person","Video Call","Other"];
const SOURCES=["Meta Lead Ads","Google Ads","Google Sheets","Excel Upload","Manual","Referral","Website","WhatsApp"];
const INDUSTRIES=["Salon / Spa","Clinic / Hospital","Real Estate","Gym / Fitness","Education / Coaching","E-commerce","IT Services","Restaurant / Food","Finance / Insurance","Manufacturing","Retail","Other"];
const CITIES=["Mumbai","Delhi","Bangalore","Hyderabad","Chennai","Pune","Kolkata","Ahmedabad","Jaipur","Surat","Lucknow","Indore","Bhopal","Nagpur","Vadodara","Other"];

// ── Storage ───────────────────────────────────────────────────────────────────
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

// ── Per-biz stages helpers (must be after LS) ─────────────────────────────────
function getBizStages(bizId){return LS.get("flm_stages_"+bizId,DEFAULT_STAGES);}
function getBizSC(bizId){const sc={...DEFAULT_SC};const stages=getBizStages(bizId);stages.forEach((s,i)=>{if(!sc[s])sc[s]=STAGE_PALETTE[i%STAGE_PALETTE.length];});return sc;}

// ── Seed ──────────────────────────────────────────────────────────────────────
if(!LS.get("flm_v4",false)){
  LS.set("flm_businesses",[
    {id:"biz1",businessName:"Sharma Salon & Spa",adminName:"Riya Sharma",email:"riya@salon.com",phone:"9876543210",city:"Mumbai",industry:"Salon / Spa",password:"Riya@123",active:true,approved:true,createdAt:"2024-01-05",teamSize:"2-5"},

function StageBadge({stage}){const c=SC[stage]||"#64748b";return <span className="stage-badge" style={{background:c+"18",color:c}}>{stage}</span>;}
function RoleBadge({role}){
  if(role==="Super Admin")return <span className="tag tag-yellow">👑 Super Admin</span>;
  if(role==="Business Admin")return <span className="tag tag-purple">🛡 Biz Admin</span>;
  return <span className="tag tag-green">👤 Sales</span>;
}
function BizAvatar({name,index=0}){
  const colors=[["#f59e0b","#ef4444"],["#7c3aed","#06b6d4"],["#10b981","#0ea5e9"],["#f97316","#ec4899"],["#8b5cf6","#10b981"]];
  const [a,b]=colors[index%colors.length];
  return <div className="biz-av" style={{background:"linear-gradient(135deg,"+a+","+b+")"}}>{name[0]}</div>;
}
function fmt(n){return n>=1000?"₹"+(n/1000).toFixed(0)+"K":"₹"+n;}
function daysAgo(d){if(!d)return"";const diff=Math.floor((Date.now()-new Date(d))/864e5);return diff===0?"Today":diff===1?"Yesterday":diff+"d ago";}

// ── SIGN UP PAGE ────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function SignupPage({onDone}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({businessName:"",industry:"",city:"",teamSize:"",adminName:"",email:"",phone:"",password:"",confirm:""});
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  const set=(f,v)=>setForm(p=>({...p,[f]:v}));

  const next=()=>{
    setErr("");
    if(step===1){
      if(!form.businessName||!form.industry||!form.city){setErr("Fill all fields.");return;}
      setStep(2);
    } else {
      if(!form.adminName||!form.email||!form.phone||!form.password){setErr("Fill all fields.");return;}
      if(form.password!==form.confirm){setErr("Passwords do not match.");return;}
      if(form.password.length<6){setErr("Password must be 6+ characters.");return;}
      const bizList=LS.get("flm_businesses",[]);
      if(bizList.find(b=>b.email.toLowerCase()===form.email.toLowerCase())){setErr("Email already registered.");return;}
      const nb={id:"biz"+Date.now(),businessName:form.businessName,industry:form.industry,city:form.city,teamSize:form.teamSize,adminName:form.adminName,email:form.email,phone:form.phone,password:form.password,active:true,approved:false,createdAt:new Date().toISOString().split("T")[0]};
      LS.set("flm_businesses",[...bizList,nb]);
      setDone(true);
    }
  };

  if(done) return (
    <div className="auth-page" style={{alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:56}}>🎉</div>
      <div style={{fontSize:28,fontWeight:800}}>You're registered!</div>
      <div style={{fontSize:14,color:"var(--text2)",textAlign:"center",maxWidth:400}}>Your account is pending approval by the Super Admin. You'll be able to log in once approved. This usually takes a few minutes.</div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:20,marginTop:8,textAlign:"center"}}>
        <div className="xs muted" style={{marginBottom:6}}>YOUR LOGIN EMAIL</div>
        <div style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--accent)"}}>{form.email}</div>
      </div>
      <button className="btn btn-primary btn-lg" style={{marginTop:8}} onClick={onDone}>Go to Login ></button>
    </div>
  );

  return (
    <div className="auth-page">
      <div className="auth-left">
        <div className="auth-brand">● FreeLeadManagement</div>
        <div className="auth-hero">Start managing leads <span>smarter</span> today</div>
        <div className="auth-sub">Join hundreds of businesses already growing with our WhatsApp-first CRM platform.</div>
        {[
          {icon:"💬",title:"WhatsApp-First CRM",text:"Message leads directly from your pipeline with one click"},
          {icon:"📊",title:"Visual Pipeline",text:"Drag & drop Kanban board to track every deal"},
          {icon:"📥",title:"Excel Import",text:"Import hundreds of leads in seconds with our template"},
          {icon:"👥",title:"Team Management",text:"Assign leads, track performance, manage your sales team"},
        ].map(f=>(
          <div key={f.icon} className="auth-feature">
            <div className="auth-feature-icon" style={{background:"rgba(0,212,255,.08)"}}>{f.icon}</div>
            <div><div className="auth-feature-title">{f.title}</div><div className="auth-feature-text">{f.text}</div></div>
          </div>
        ))}
        <div className="auth-stats">
          <div className="auth-stat"><div className="auth-stat-val">500+</div><div className="auth-stat-lbl">Businesses</div></div>
          <div className="auth-stat"><div className="auth-stat-val">Free</div><div className="auth-stat-lbl">Forever Plan</div></div>
        </div>
      </div>
      <div className="auth-right">
        <div className="auth-box">
          <div className="auth-title">Create your account</div>
          <div className="auth-desc">Step {step} of 2  -  {step===1?"Business Details":"Admin Account"}</div>
          {/* Progress */}
          <div style={{display:"flex",gap:6,marginBottom:24}}>
            {[1,2].map(s=><div key={s} style={{flex:1,height:4,borderRadius:4,background:s<=step?"var(--accent)":"var(--surface2)",transition:"background .3s"}}/>)}
          </div>
          {err&&<div className="alert alert-err">⚠️ {err}</div>}
          {step===1&&(
            <div className="form-grid">
              <div className="form-group full"><label>Business Name *</label><input type="text" placeholder="e.g. Sharma Salon & Spa" value={form.businessName} onChange={e=>set("businessName",e.target.value)}/></div>
              <div className="form-group"><label>Industry *</label><select value={form.industry} onChange={e=>set("industry",e.target.value)}><option value="">Select industry</option>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select></div>
              <div className="form-group"><label>City *</label><select value={form.city} onChange={e=>set("city",e.target.value)}><option value="">Select city</option>{CITIES.map(c=><option key={c}>{c}</option>)}</select></div>
              <div className="form-group full"><label>Team Size</label><select value={form.teamSize} onChange={e=>set("teamSize",e.target.value)}><option value="">Select team size</option>{["Just me","2-5","5-10","10-25","25+"].map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
          )}
          {step===2&&(
            <div className="form-grid">
              <div className="form-group full"><label>Your Full Name *</label><input type="text" placeholder="Riya Sharma" value={form.adminName} onChange={e=>set("adminName",e.target.value)}/></div>
              <div className="form-group"><label>Email Address * (login ID)</label><input type="email" placeholder="riya@salon.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
              <div className="form-group"><label>Mobile Number *</label><input type="tel" placeholder="9876543210" value={form.phone} onChange={e=>set("phone",e.target.value)}/></div>
              <div className="form-group"><label>Password *</label><input type="password" placeholder="Min 6 characters" value={form.password} onChange={e=>set("password",e.target.value)}/></div>
              <div className="form-group"><label>Confirm Password *</label><input type="password" placeholder="Repeat password" value={form.confirm} onChange={e=>set("confirm",e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()}/></div>
            </div>
          )}
          <div className="flex ic gap2" style={{marginTop:8}}>
            {step===2&&<button className="btn btn-ghost" onClick={()=>{setStep(1);setErr("");}}>Back</button>}
            <button className="btn btn-primary btn-lg" style={{flex:1}} onClick={next}>{step===1?"Next: Admin Details >":"Create Account 🚀"}</button>
          </div>
          <div className="auth-switch">Already have an account? <a onClick={onDone}>Sign in</a></div>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN PAGE ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function LoginPage({onLogin,onSignup}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [show,setShow]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [mode,setMode]=useState("login"); // login | forgot | reset
  const [fpEmail,setFpEmail]=useState("");
  const [fpCode,setFpCode]=useState("");
  const [fpNewPw,setFpNewPw]=useState("");
  const [fpConfirm,setFpConfirm]=useState("");
  const [fpMsg,setFpMsg]=useState(null);
  const [sentCode,setSentCode]=useState(null);
  const [fpUser,setFpUser]=useState(null);

  const login=()=>{
    setErr("");
    if(!email.trim()||!pw.trim()){setErr("Enter email and password.");return;}
    setLoading(true);
    setTimeout(()=>{
      const e=email.toLowerCase().trim();
      if(e==="admin@freeleadmanagement.com"){
        const storedPw=LS.get("flm_sa_pw","Admin@1234");
        if(pw===storedPw){onLogin({id:"superadmin",name:"Super Admin",email:e,role:"Super Admin",bizId:null});setLoading(false);return;}
      }
      const bizList=LS.get("flm_businesses",[]);
      const biz=bizList.find(b=>b.email.toLowerCase()===e&&b.password===pw);
      if(biz){
        if(!biz.approved){setErr("Your account is pending approval by the Super Admin.");setLoading(false);return;}
        if(!biz.active){setErr("Your account has been suspended. Contact support.");setLoading(false);return;}
        onLogin({id:"bizadmin_"+biz.id,name:biz.adminName,email:biz.email,role:"Business Admin",bizId:biz.id,bizName:biz.businessName});
        setLoading(false);return;
      }
      const users=LS.get("flm_users",[]);
      const user=users.find(u=>u.email.toLowerCase()===e&&u.password===pw&&u.active);
      if(user){
        const b=bizList.find(x=>x.id===user.bizId);
        onLogin({...user,role:user.role,bizName:b?b.businessName:"",bizId:user.bizId});
        setLoading(false);return;
      }
      setErr("Incorrect email or password.");
      setLoading(false);
    },500);
  };

  // Forgot password: find user, generate mock OTP (stored locally)
  const sendReset=()=>{
    setFpMsg(null);
    const e=fpEmail.toLowerCase().trim();
    if(!e){setFpMsg({t:"err",m:"Enter your email address."});return;}
    // find in businesses or users
    const bizList=LS.get("flm_businesses",[]);
    const users=LS.get("flm_users",[]);
    const biz=bizList.find(b=>b.email.toLowerCase()===e);
    const user=users.find(u=>u.email.toLowerCase()===e);
    const isSA=e==="admin@freeleadmanagement.com";
    if(!biz&&!user&&!isSA){setFpMsg({t:"err",m:"No account found with this email."});return;}
    // Generate a 6-digit code and store with expiry
    const code=String(100000+Math.floor(Math.random()*900000));
    const expiry=Date.now()+15*60*1000; // 15 mins
    LS.set("flm_reset_"+e,{code,expiry});
    setSentCode(code);
    setFpUser({email:e,isBiz:!!biz,isUser:!!user,isSA});
    setMode("reset");
    setFpMsg({t:"ok",m:"Reset code generated! (In production, this would be emailed. For now, see the code below.)"});
  };

  const doReset=()=>{
    setFpMsg(null);
    if(!fpCode||!fpNewPw||!fpConfirm){setFpMsg({t:"err",m:"Fill all fields."});return;}
    if(fpNewPw!==fpConfirm){setFpMsg({t:"err",m:"Passwords do not match."});return;}
    if(fpNewPw.length<6){setFpMsg({t:"err",m:"Password must be at least 6 characters."});return;}
    const e=fpEmail.toLowerCase().trim();
    const stored=LS.get("flm_reset_"+e,null);
    if(!stored||stored.code!==fpCode.trim()){setFpMsg({t:"err",m:"Incorrect reset code."});return;}
    if(Date.now()>stored.expiry){setFpMsg({t:"err",m:"Code has expired. Request a new one."});return;}
    // Update password
    if(fpUser.isSA){LS.set("flm_sa_pw",fpNewPw);}
    else if(fpUser.isBiz){const bl=LS.get("flm_businesses",[]);LS.set("flm_businesses",bl.map(b=>b.email.toLowerCase()===e?{...b,password:fpNewPw}:b));}
    else if(fpUser.isUser){const ul=LS.get("flm_users",[]);LS.set("flm_users",ul.map(u=>u.email.toLowerCase()===e?{...u,password:fpNewPw}:u));}
    LS.set("flm_reset_"+e,null);
    setFpMsg({t:"ok",m:"Password updated! You can now sign in."});
    setTimeout(()=>{setMode("login");setEmail(fpEmail);setFpEmail("");setFpCode("");setFpNewPw("");setFpConfirm("");setSentCode(null);},2000);
  };

  return (
    <div className="auth-page">
      <div className="auth-left">
        <div className="auth-brand">● FreeLeadManagement</div>
        <div className="auth-hero">Your leads, <span>organized</span></div>
        <div className="auth-sub">A WhatsApp-first CRM built for Indian small businesses. Simple, powerful, free.</div>
        {[
          {icon:"💬",title:"One-click WhatsApp",text:"Message any lead instantly from the CRM"},
          {icon:"📋",title:"Visual Pipeline",text:"Drag & drop leads through your sales stages"},
          {icon:"📥",title:"Auto Import",text:"Import leads from Facebook & Google Ads via Sheets"},
          {icon:"📊",title:"Performance Reports",text:"Track team performance and conversion rates"},
        ].map(f=>(
          <div key={f.icon} className="auth-feature">
            <div className="auth-feature-icon" style={{background:"rgba(0,212,255,.08)"}}>{f.icon}</div>
            <div><div className="auth-feature-title">{f.title}</div><div className="auth-feature-text">{f.text}</div></div>
          </div>
        ))}
      </div>
      <div className="auth-right">
        <div className="auth-box">
          {/* ── LOGIN ── */}
          {mode==="login"&&(
            <>
              <div className="auth-title">Sign in to your CRM</div>
              <div className="auth-desc" style={{marginBottom:22}}>Welcome back! Enter your credentials below.</div>
              {err&&<div className="alert alert-err">⚠️ {err}</div>}
              <div className="form-group" style={{marginBottom:14}}>
                <label>Email Address</label>
                <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
              </div>
              <div className="form-group" style={{marginBottom:6}}>
                <label>Password</label>
                <div className="input-wrap">
                  <input type={show?"text":"password"} placeholder="Your password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} style={{paddingRight:42}}/>
                  <span className="input-icon" onClick={()=>setShow(!show)}>{show?"🙈":"👁️"}</span>
                </div>
              </div>
              <div style={{textAlign:"right",marginBottom:18}}>
                <a style={{fontSize:12,color:"var(--accent)",cursor:"pointer"}} onClick={()=>{setMode("forgot");setFpEmail(email);setFpMsg(null);}}>🔑 Forgot Password?</a>
              </div>
              <button id="flm-login-btn" className="btn btn-primary btn-lg w-full" onClick={login} disabled={loading}>{loading?"Signing in...":"Sign In →"}</button>
              <div className="auth-switch">New business? <a onClick={onSignup}>Create free account</a></div>
              <div className="divider"/>
              <div style={{marginBottom:6}}>
                <div className="xs bold muted" style={{textTransform:"uppercase",letterSpacing:".07em",marginBottom:10,textAlign:"center"}}>🧪 Demo Testing</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button className="btn btn-ghost w-full" style={{justifyContent:"flex-start",gap:10,padding:"10px 14px"}}
                    onClick={()=>{setEmail("riya@salon.com");setPw("Riya@123");setTimeout(()=>document.getElementById("flm-login-btn").click(),50);}}>
                    <span style={{fontSize:18}}>🛡</span>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontWeight:700,fontSize:12,color:"var(--purple)"}}>Business Admin Demo</div>
                      <div className="mono xs muted">riya@salon.com</div>
                    </div>
                    <span style={{marginLeft:"auto",fontSize:11,color:"var(--text3)"}}>Click to login →</span>
                  </button>
                  <button className="btn btn-ghost w-full" style={{justifyContent:"flex-start",gap:10,padding:"10px 14px"}}
                    onClick={()=>{setEmail("rahul@salon.com");setPw("Rahul@123");setTimeout(()=>document.getElementById("flm-login-btn").click(),50);}}>
                    <span style={{fontSize:18}}>👤</span>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontWeight:700,fontSize:12,color:"var(--green)"}}>Sales User Demo</div>
                      <div className="mono xs muted">rahul@salon.com</div>
                    </div>
                    <span style={{marginLeft:"auto",fontSize:11,color:"var(--text3)"}}>Click to login →</span>
                  </button>
                </div>
              </div>
            </>
          )}

          {/* ── FORGOT PASSWORD ── */}
          {mode==="forgot"&&(
            <>
              <div className="auth-title">🔑 Forgot Password</div>
              <div className="auth-desc" style={{marginBottom:20}}>Enter your registered email. A reset code will be generated for you.</div>
              {fpMsg&&<div className={"alert "+(fpMsg.t==="ok"?"alert-ok":"alert-err")} style={{marginBottom:14}}>{fpMsg.t==="ok"?"✅":"⚠️"} {fpMsg.m}</div>}
              <div className="form-group" style={{marginBottom:18}}>
                <label>Registered Email</label>
                <input type="email" placeholder="your@email.com" value={fpEmail} onChange={e=>setFpEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendReset()}/>
              </div>
              <button className="btn btn-primary btn-lg w-full" onClick={sendReset}>Generate Reset Code →</button>
              <div className="auth-switch"><a onClick={()=>setMode("login")}>← Back to Sign In</a></div>
            </>
          )}

          {/* ── RESET PASSWORD ── */}
          {mode==="reset"&&(
            <>
              <div className="auth-title">🔐 Reset Password</div>
              <div className="auth-desc" style={{marginBottom:16}}>Enter the 6-digit code and your new password.</div>
              {fpMsg&&<div className={"alert "+(fpMsg.t==="ok"?"alert-ok":"alert-err")} style={{marginBottom:14}}>{fpMsg.t==="ok"?"✅":"⚠️"} {fpMsg.m}</div>}
              {sentCode&&(
                <div style={{background:"rgba(0,212,255,.08)",border:"1px solid rgba(0,212,255,.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>
                  <div className="xs muted" style={{marginBottom:4}}>Your reset code (share with user):</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:26,fontWeight:800,color:"var(--accent)",letterSpacing:"0.2em"}}>{sentCode}</div>
                  <div className="xs muted" style={{marginTop:4}}>Valid for 15 minutes</div>
                </div>
              )}
              <div className="form-group" style={{marginBottom:12}}>
                <label>Reset Code</label>
                <input type="text" placeholder="6-digit code" value={fpCode} onChange={e=>setFpCode(e.target.value)} maxLength={6} style={{letterSpacing:"0.2em",fontFamily:"var(--mono)",fontSize:18}}/>
              </div>
              <div className="form-group" style={{marginBottom:12}}>
                <label>New Password</label>
                <input type="password" placeholder="Min 6 characters" value={fpNewPw} onChange={e=>setFpNewPw(e.target.value)}/>
              </div>
              <div className="form-group" style={{marginBottom:18}}>
                <label>Confirm New Password</label>
                <input type="password" placeholder="Repeat password" value={fpConfirm} onChange={e=>setFpConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doReset()}/>
              </div>
              <button className="btn btn-primary btn-lg w-full" onClick={doReset}>Set New Password →</button>
              <div className="auth-switch"><a onClick={()=>{setMode("forgot");setFpCode("");setFpNewPw("");setFpConfirm("");}}>← Try different email</a></div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const [users,setUsers]=useState(()=>LS.get("flm_users",[]));
  const [darkMode,setDarkMode]=useState(()=>LS.get("flm_theme","dark")==="dark");
  const [bizStages,setBizStages]=useState(()=>currentUser?getBizStages(currentUser.bizId):DEFAULT_STAGES);

  useEffect(()=>{LS.set("flm_leads",leads);},[leads]);
  useEffect(()=>{LS.set("flm_businesses",businesses);},[businesses]);
  useEffect(()=>{LS.set("flm_users",users);},[users]);
  useEffect(()=>{if(currentUser&&currentUser.bizId)setBizStages(getBizStages(currentUser.bizId));},[currentUser]);
  useEffect(()=>{
    LS.set("flm_theme",darkMode?"dark":"light");
    document.body.classList.toggle("light",!darkMode);
  },[darkMode]);

  const [gSyncStatus,setGSyncStatus]=useState(null); // null | {loading} | {ok,added,skipped} | {err}
  if(screen==="signup") return <SignupPage onDone={()=>setScreen("login")}/>;
  if(screen==="login"||!currentUser) return <LoginPage onLogin={u=>{setCurrentUser(u);setScreen("app");setPage("dashboard");}} onSignup={()=>setScreen("signup")}/>;

  const isSA=currentUser.role==="Super Admin";
  const isBA=currentUser.role==="Business Admin";
  const isSales=currentUser.role==="Sales";

  const myLeads=isSA?leads:leads.filter(l=>l.bizId===currentUser.bizId&&(isBA||l.assignedTo===currentUser.id));
  const myUsers=isSA?users:users.filter(u=>u.bizId===currentUser.bizId);
  const pendingBiz=businesses.filter(b=>!b.approved);

  const filteredLeads=myLeads.filter(l=>{
    const ms=l.name.toLowerCase().includes(search.toLowerCase())||l.phone.includes(search);
    return ms&&(filterStage==="All"||l.stage===filterStage)&&(filterSource==="All"||l.source===filterSource);
  });

  const stats={total:myLeads.length,converted:myLeads.filter(l=>l.stage==="Converted").length,pipeline:myLeads.filter(l=>!["Converted","Lost"].includes(l.stage)).reduce((a,b)=>a+b.value,0),followUps:myLeads.filter(l=>l.followUp&&l.followUp>=new Date().toISOString().split("T")[0]).length};

  const logout=()=>{setCurrentUser(null);setScreen("login");setPage("dashboard");};
  const openLead=l=>{setSelectedLead(l);setModal("leadDetail");};
  const openWA=(ph,e)=>{if(e)e.stopPropagation();window.open("https://wa.me/91"+ph,"_blank");};
  const loginAs=(biz)=>{
    setCurrentUser({id:"bizadmin_"+biz.id,name:biz.adminName,email:biz.email,role:"Business Admin",bizId:biz.id,bizName:biz.businessName,_impersonating:true});
    setPage("dashboard");
  };
  const returnToSA=()=>{
    setCurrentUser({id:"superadmin",name:"Super Admin",email:"admin@freeleadmanagement.com",role:"Super Admin",bizId:null});
    setPage("dashboard");
  };

  const syncGSheet=async()=>{
    if(!currentUser||!currentUser.bizId)return;
    const cfg=LS.get("flm_setup_"+currentUser.bizId,{});
    const sheetId=(cfg.gSheetId||"").trim();
    const tab=(cfg.gSheetTab||"Sheet1").trim();
    if(!sheetId){setGSyncStatus({err:"No Google Sheet ID configured. Go to Setup → Google Sheets."});return;}
    setGSyncStatus({loading:true});
    try{
      const url="https://docs.google.com/spreadsheets/d/"+sheetId+"/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(tab);
      const res=await fetch(url);
      if(!res.ok){setGSyncStatus({err:"Could not fetch sheet. Check Sheet ID, tab name, and make sure sharing is set to 'Anyone with link → Viewer'."});return;}
      const text=await res.text();
      // Parse CSV
      const rows=text.trim().split("\n").map(r=>{
        const cells=[];let cur="";let inQ=false;
        for(let ci=0,dq=String.fromCharCode(34),cm=String.fromCharCode(44);ci<r.length;ci++){const ch=r[ci];if(ch===dq&&!inQ){inQ=true;}else if(ch===dq&&inQ&&r[ci+1]===dq){cur+=dq;ci++;}else if(ch===dq&&inQ){inQ=false;}else if(ch===cm&&!inQ){cells.push(cur.trim());cur="";}else{cur+=ch;}}
        cells.push(cur.trim());return cells;
      });
      if(rows.length<2){setGSyncStatus({err:"Sheet appears empty or has only headers."});return;}
      const headers=rows[0].map(h=>h.replace(/"/g,"").toLowerCase().trim());
      const col=k=>headers.indexOf(k);
      const existingLeads=LS.get("flm_leads",[]);
      const existingIds=new Set(existingLeads.map(l=>l.gSheetId).filter(Boolean));
      let added=0;let skipped=0;
      const newLeads=[...existingLeads];
      const defaultStage=cfg.gSheetStage||"New Lead";
      const assignTo=cfg.gSheetAssignTo||currentUser.id;
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        const getCell=(k)=>{const idx=col(k);return idx>=0?(r[idx]||"").replace(/^"|"$/g,"").trim():"";}
        const rowId=getCell("id")||getCell("lead_id");
        if(rowId&&existingIds.has(rowId)){skipped++;continue;}
        const fullName=getCell("full_name")||getCell("name");
        const phone=getCell("phone_number")||getCell("phone");
        if(!fullName&&!phone){skipped++;continue;}
        // Build notes from extra fields
        const extraNotes=[];
        const role=getCell("what_is_your_role_in_the_business?");if(role)extraNotes.push("Role: "+role);
        const branches=getCell("how_many_branches_do_you_operate?");if(branches)extraNotes.push("Branches: "+branches);
        const software=getCell("are_you_using_any_software_?");if(software)extraNotes.push("Using software: "+software);
        const website=getCell("website");if(website)extraNotes.push("Website: "+website);
        const adName=getCell("ad_name");if(adName)extraNotes.push("Ad: "+adName);
        const adset=getCell("adset_name");if(adset)extraNotes.push("Adset: "+adset);
        const formName=getCell("form_name");if(formName)extraNotes.push("Form: "+formName);
        const manualNote=getCell("notes");
        const allNotes=[...extraNotes];if(manualNote)allNotes.push(manualNote);
        const platform=getCell("platform")||"Google Sheets";
        const createdRaw=getCell("created_time");
        const createdAt=createdRaw?createdRaw.split("T")[0]:new Date().toISOString().split("T")[0];
        const lead={
          id:Date.now()+i,
          gSheetId:rowId||null,
          bizId:currentUser.bizId,
          name:fullName||"Unknown",
          phone:phone.replace(/\D/g,""),
          email:getCell("email"),
          campaign:getCell("campaign_name"),
          source:platform.toLowerCase().includes("facebook")?"Meta Lead Ads":platform.toLowerCase().includes("google")?"Google Ads":"Google Sheets",
          stage:defaultStage,
          value:0,
          assignedTo:assignTo,
          notes:allNotes.length>0?[{text:allNotes.join(" | "),date:createdAt}]:[],
          calls:[],timeline:[],
          createdAt:createdAt,
          leadStatus:getCell("lead_status"),
          companyName:getCell("company_name"),
          adName:adName,
          campaignId:getCell("campaign_id"),
        };
        newLeads.unshift(lead);
        existingIds.add(rowId);
        added++;
      }
      setLeads(newLeads);
      setGSyncStatus({ok:true,added,skipped,total:rows.length-1});
    }catch(ex){setGSyncStatus({err:"Sync failed: "+(ex.message||"Unknown error. Make sure sheet is public.")});}
  };

  const PAGE_TITLES={dashboard:"Dashboard",leads:"All Leads",pipeline:"Pipeline Board",import:"Import Leads",businesses:"Manage Businesses",team:"Team & Users",profile:"My Profile",setup:"Setup & Integrations"};

  const navItems=[
    {key:"dashboard",icon:"🏠",label:"Dashboard"},
    {key:"leads",icon:"👥",label:"All Leads"},
    {key:"pipeline",icon:"📋",label:"Pipeline"},
    {key:"import",icon:"📥",label:"Import Leads"},
    ...(isSA?[{key:"businesses",icon:"🏢",label:"Businesses",badge:pendingBiz.length}]:[]),
    ...(!isSA?[{key:"team",icon:"👤",label:"Team & Users"}]:[]),
    ...(!isSA?[{key:"setup",icon:"🔧",label:"Setup"}]:[]),
    {key:"profile",icon:"⚙️",label:"My Profile"},
  ];

  const avClass=isSA?"av-super":isBA?"av-biz":"av-sales";

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">● FreeLeadMgmt</div>
          {currentUser.bizName&&<div className="logo-biz">{currentUser.bizName}</div>}
          <div className="logo-role">{currentUser.role}</div>
        </div>
        <nav className="sidebar-nav">
          {navItems.map(n=>(
            <div key={n.key} className={"nav-item"+(page===n.key?" active":"")} onClick={()=>setPage(n.key)} style={{position:"relative"}}>
              <span>{n.icon}</span><span>{n.label}</span>
              {n.badge>0&&<span style={{background:"var(--yellow)",color:"#000",borderRadius:20,fontSize:10,fontWeight:800,padding:"1px 6px",marginLeft:"auto"}}>{n.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-pill" onClick={()=>setPage("profile")}>
            <div className={"av "+(avClass)}>{currentUser.name[0]}</div>
            <div style={{overflow:"hidden",flex:1}}>
              <div className="un">{currentUser.name.split(" ")[0]}</div>
              <div className="ur">{currentUser.role}</div>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm w-full" style={{marginTop:8}} onClick={logout}>🚪 Logout</button>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          <div className="topbar-title">{PAGE_TITLES[page]||""}</div>
          <div className="topbar-right">
            {/* Theme Toggle */}
            <button className="btn btn-ghost btn-sm" style={{padding:"6px 10px",fontSize:16}} onClick={()=>setDarkMode(!darkMode)} title={darkMode?"Switch to Light":"Switch to Dark"}>
              {darkMode?"☀️":"🌙"}
            </button>
            {isSA&&pendingBiz.length>0&&<div style={{position:"relative",cursor:"pointer"}} onClick={()=>setPage("businesses")}><span className="tag tag-yellow">🔔 {pendingBiz.length} pending</span></div>}
            {!isSA&&<button className="btn btn-primary" onClick={()=>setModal("addLead")}>+ Add Lead</button>}
          </div>
        </header>
        <div className="content">
          {currentUser._impersonating&&(
            <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span>👁️</span><div style={{flex:1,fontSize:12,fontWeight:700,color:"var(--yellow)"}}>Viewing as <strong>{currentUser.name}</strong> — Super Admin mode</div>
              <button className="btn btn-warning btn-sm" onClick={returnToSA}>← Back to Super Admin</button>
            </div>
          )}
          {page==="dashboard"&&(isSA
            ? <SuperAdminDashboard businesses={businesses} setBusinesses={setBusinesses} leads={leads} users={users} setPage={setPage} loginAs={loginAs}/>
            : <Dashboard stats={stats} leads={myLeads} users={myUsers} currentUser={currentUser} openLead={openLead} openWA={openWA} syncGSheet={syncGSheet} gSyncStatus={gSyncStatus} setGSyncStatus={setGSyncStatus}/>
          )}
          {page==="leads"&&<LeadsPage leads={filteredLeads} search={search} setSearch={setSearch} filterStage={filterStage} setFilterStage={setFilterStage} filterSource={filterSource} setFilterSource={setFilterSource} openLead={openLead} openWA={openWA} setLeads={setLeads} users={myUsers}/>}
          {page==="pipeline"&&<PipelinePage leads={myLeads} setLeads={setLeads} openLead={openLead} openWA={openWA} stages={bizStages} sc={getBizSC(currentUser.bizId)}/>}
          {page==="import"&&<ImportPage leads={leads} setLeads={setLeads} currentUser={currentUser} users={myUsers}/>}
          {page==="businesses"&&isSA&&<BusinessesPage businesses={businesses} setBusinesses={setBusinesses} users={users} leads={leads} loginAs={loginAs}/>}
          {page==="team"&&!isSA&&<TeamPage users={myUsers} setUsers={setUsers} leads={myLeads} currentUser={currentUser}/>}
          {page==="setup"&&!isSA&&<SetupPage currentUser={currentUser} bizStages={bizStages} setBizStages={(s)=>{setBizStages(s);LS.set("flm_stages_"+currentUser.bizId,s);}}/>}
          {page==="profile"&&<ProfilePage currentUser={currentUser} setCurrentUser={setCurrentUser} users={users} setUsers={setUsers} businesses={businesses} setBusinesses={setBusinesses}/>}
        </div>
      </div>

      {/* Mobile bottom nav */}
      <nav className="mob-nav">
        <div className="mob-nav-items">
          {navItems.map(n=>(
            <div key={n.key} className={"mob-nav-item"+(page===n.key?" active":"")} onClick={()=>setPage(n.key)}>
              {n.badge>0&&<span className="mob-badge">{n.badge}</span>}
              <span className="ni">{n.icon}</span>
              <span>{n.label.split(" ")[0]}</span>
            </div>
          ))}
          <div className="mob-nav-item" onClick={()=>setDarkMode(!darkMode)}>
            <span className="ni">{darkMode?"☀️":"🌙"}</span>
            <span>Theme</span>
          </div>
          <div className="mob-nav-item" onClick={logout}>
            <span className="ni">🚪</span>
            <span>Logout</span>
          </div>
        </div>
      </nav>

      {modal==="addLead"&&<AddLeadModal close={()=>setModal(null)} leads={leads} setLeads={setLeads} users={myUsers} currentUser={currentUser} stages={bizStages}/>}
      {modal==="leadDetail"&&selectedLead&&<LeadDetailModal lead={leads.find(l=>l.id===selectedLead.id)||selectedLead} leads={leads} setLeads={setLeads} close={()=>{setModal(null);setSelectedLead(null);}} users={myUsers} openWA={openWA} currentUser={currentUser} stages={bizStages} sc={getBizSC(currentUser.bizId)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ── SUPER ADMIN DASHBOARD ───────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function SuperAdminDashboard({businesses,setBusinesses,leads,users,setPage,loginAs}){
  const approved=businesses.filter(b=>b.approved);
  const pending=businesses.filter(b=>!b.approved);
  const active=businesses.filter(b=>b.approved&&b.active);
  const totalLeads=leads.length;
  const totalConverted=leads.filter(l=>l.stage==="Converted").length;
  const totalPipeline=leads.filter(l=>!["Converted","Lost"].includes(l.stage)).reduce((a,b)=>a+b.value,0);
  const totalUsers=users.length;

  const [saNewPw,setSaNewPw]=useState("");
  const [saNewPw2,setSaNewPw2]=useState("");
  const [saPwMsg,setSaPwMsg]=useState(null);
  const [showPwPanel,setShowPwPanel]=useState(false);

  const changeSaPw=()=>{
    setSaPwMsg(null);
    if(!saNewPw||!saNewPw2){setSaPwMsg({t:"err",m:"Both fields required."});return;}
    if(saNewPw!==saNewPw2){setSaPwMsg({t:"err",m:"Passwords don't match."});return;}
    if(saNewPw.length<6){setSaPwMsg({t:"err",m:"Min 6 characters."});return;}
    // Store in localStorage so it persists
    LS.set("flm_sa_pw",saNewPw);
    setSaNewPw("");setSaNewPw2("");
    setSaPwMsg({t:"ok",m:"Password saved! It will be used on next login."});
  };

  const approve=(id)=>setBusinesses(p=>p.map(b=>b.id===id?{...b,approved:true,active:true}:b));
  const reject=(id)=>setBusinesses(p=>p.filter(b=>b.id!==id));
  const toggle=(id)=>setBusinesses(p=>p.map(b=>b.id===id?{...b,active:!b.active}:b));
  const updateBizPw=(id,pw)=>setBusinesses(p=>p.map(b=>b.id===id?{...b,password:pw}:b));

  const topBiz=[...approved].map(b=>({...b,leadCount:leads.filter(l=>l.bizId===b.id).length,converted:leads.filter(l=>l.bizId===b.id&&l.stage==="Converted").length,userCount:users.filter(u=>u.bizId===b.id).length})).sort((a,b)=>b.leadCount-a.leadCount).slice(0,5);
  const industryData=approved.reduce((acc,b)=>{acc[b.industry]=(acc[b.industry]||0)+1;return acc;},{});
  const recentSignups=[...businesses].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  const recentLeads=[...leads].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);

  return (
    <>
      {/* Pending approvals banner */}
      {pending.length>0&&(
        <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:20}}>⏳</span>
          <div style={{flex:1,minWidth:160}}>
            <div style={{fontWeight:800,fontSize:14,color:"var(--yellow)"}}>{pending.length} new business{pending.length>1?"es":""} waiting for approval</div>
            <div className="xs muted" style={{marginTop:2}}>Review and approve them to let them access the CRM</div>
          </div>
          <button className="btn btn-warning btn-sm" onClick={()=>setPage("businesses")}>Review Now ></button>
        </div>
      )}

      {/* Top stats */}
      <div className="sa-stat-grid">
        {[
          {icon:"🏢",val:approved.length,label:"Active Businesses",sub:pending.length+" pending",color:"var(--accent)",grad:"linear-gradient(90deg,var(--accent),transparent)"},
          {icon:"👥",val:totalUsers,label:"Total Users",sub:"Across all businesses",color:"var(--purple)",grad:"linear-gradient(90deg,var(--purple),transparent)"},
          {icon:"📋",val:totalLeads,label:"Total Leads",sub:totalConverted+" converted",color:"var(--green)",grad:"linear-gradient(90deg,var(--green),transparent)"},
          {icon:"💰",val:fmt(totalPipeline),label:"Pipeline Value",sub:Math.round(totalConverted/Math.max(totalLeads,1)*100)+"% conversion",color:"var(--yellow)",grad:"linear-gradient(90deg,var(--yellow),transparent)"},
        ].map(s=>(
          <div key={s.label} className="sa-stat">
            <div className="sa-stat-bar" style={{background:s.grad}}/>
            <div className="sa-stat-icon">{s.icon}</div>
            <div className="sa-stat-val" style={{color:s.color}}>{s.val}</div>
            <div className="sa-stat-label">{s.label}</div>
            <div className="sa-stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Pending approvals */}
      {pending.length>0&&(
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title">⏳ Pending Approvals ({pending.length})</div>
          {pending.map((b,i)=>(
            <div key={b.id} className="biz-row" style={{borderRadius:10,marginBottom:8,background:"var(--surface2)",border:"1px solid rgba(245,158,11,.15)"}}>
              <BizAvatar name={b.businessName} index={i}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="bold sm">{b.businessName}</div>
                <div className="xs muted">{b.adminName} · {b.city} · {b.industry}</div>
                <div className="xs muted mono">{b.email} · {b.phone}</div>
              </div>
              <div className="xs muted" style={{marginRight:8}}>{daysAgo(b.createdAt)}</div>
              <div className="flex ic gap2" style={{flexWrap:"wrap",justifyContent:"flex-end"}}>
                <button className="btn btn-success btn-sm" onClick={()=>approve(b.id)}>✅ Approve</button>
                <button className="btn btn-danger btn-sm" onClick={()=>{if(window.confirm("Reject and delete this signup?"))reject(b.id);}}>✕ Reject</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* SA Tools: Change Password + Login As */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}} className="dash-grid">
        {/* Change SA password */}
        <div className="card">
          <div className="flex ic" style={{marginBottom:14}}>
            <div className="card-title" style={{marginBottom:0}}>🔑 Super Admin Password</div>
            <button className="btn btn-ghost btn-sm mla" onClick={()=>setShowPwPanel(!showPwPanel)}>{showPwPanel?"Hide ^":"Edit v"}</button>
          </div>
          {!showPwPanel&&<div className="xs muted">Click Edit to change your Super Admin login password. Changes are saved immediately.</div>}
          {showPwPanel&&(
            <>
              {saPwMsg&&<div className={"alert "+(saPwMsg.t==="ok"?"alert-ok":"alert-err")}>{saPwMsg.t==="ok"?"✅":"⚠️"} {saPwMsg.m}</div>}
              <div className="form-group" style={{marginBottom:10}}><label>New Password</label><input type="password" placeholder="Min 6 characters" value={saNewPw} onChange={e=>setSaNewPw(e.target.value)}/></div>
              <div className="form-group" style={{marginBottom:12}}><label>Confirm Password</label><input type="password" placeholder="Repeat password" value={saNewPw2} onChange={e=>setSaNewPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changeSaPw()}/></div>
              <button className="btn btn-primary btn-sm w-full" onClick={changeSaPw}>Update Password</button>
            </>
          )}
        </div>

        {/* Login As */}
        <div className="card">
          <div className="card-title">🔐 Login As Business</div>
          <div className="xs muted" style={{marginBottom:12}}>Click any business below to view their CRM as their admin. A banner will let you return.</div>
          <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:7}}>
            {approved.length===0&&<div className="muted sm">No approved businesses yet</div>}
            {approved.map((b,i)=>(
              <div key={b.id} className="flex ic gap2" style={{background:"var(--surface2)",borderRadius:9,padding:"9px 12px"}}>
                <BizAvatar name={b.businessName} index={i}/>
                <div style={{flex:1,minWidth:0}}>
                  <div className="sm bold" style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.businessName}</div>
                  <div className="xs muted">{b.adminName} · {b.city}</div>
                </div>
                <button className="btn btn-sm btn-purple" onClick={()=>loginAs(b)}>👁 Enter</button>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}} className="dash-grid">
        {/* Top businesses */}
        <div className="card">
          <div className="card-title">🏆 Top Businesses by Leads</div>
          {topBiz.length===0&&<div className="muted sm">No data yet</div>}
          {topBiz.map((b,i)=>{
            const maxL=(topBiz[0]&&topBiz[0].leadCount)||1;
            return (
              <div key={b.id} style={{marginBottom:14}}>
                <div className="flex ic gap2" style={{marginBottom:4}}>
                  <span className="xs bold muted" style={{width:16}}>#{i+1}</span>
                  <div className="sm bold" style={{flex:1}}>{b.businessName}</div>
                  <span className="xs muted">{b.city}</span>
                  <span className="tag tag-blue xs">{b.leadCount} leads</span>
                </div>
                <div className="growth-bar" style={{marginLeft:20}}>
                  <div className="growth-fill" style={{width:((b.leadCount/maxL)*100)+"%",background:"linear-gradient(90deg,"+(SC["Contacted"])+","+(SC["Interested"])+")"}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Industry breakdown */}
        <div className="card">
          <div className="card-title">🏭 Business by Industry</div>
          {Object.entries(industryData).length===0&&<div className="muted sm">No data yet</div>}
          {Object.entries(industryData).sort((a,b)=>b[1]-a[1]).map(([ind,cnt])=>(
            <div key={ind} className="flex ic gap2" style={{marginBottom:10}}>
              <div className="sm" style={{flex:1}}>{ind}</div>
              <div style={{flex:1.5,height:7,background:"var(--surface2)",borderRadius:4,overflow:"hidden"}}>

            <div className="card-title" style={{marginBottom:0}}>🆕 Recent Signups</div>
            <button className="btn btn-ghost btn-sm mla" onClick={()=>setPage("businesses")}>View All ></button>
          </div>
          {recentSignups.map((b,i)=>(
            <div key={b.id} className="flex ic gap2" style={{marginBottom:12,paddingBottom:12,borderBottom:i<recentSignups.length-1?"1px solid var(--border)":"none"}}>
              <BizAvatar name={b.businessName} index={i}/>

                <div className="xs muted">{b.city} · {b.industry}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <span className={"tag "+(b.approved?(b.active?"tag-green":"tag-red"):"tag-yellow")}>{b.approved?(b.active?"Active":"Suspended"):"Pending"}</span>
                <div className="xs muted" style={{marginTop:3}}>{b.createdAt}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Recent lead activity */}
        <div className="card">
          <div className="flex ic" style={{marginBottom:14}}>
            <div className="card-title" style={{marginBottom:0}}>⚡ Recent Lead Activity</div>
          </div>
          {recentLeads.length===0&&<div className="muted sm">No leads yet across any business</div>}
          {recentLeads.map(l=>{
            const biz=businesses.find(b=>b.id===l.bizId);

              <div key={l.id} className="activity-item" style={{borderRadius:8,marginBottom:6,borderBottom:"none",background:"var(--surface2)",padding:"10px 12px"}}>

          })}
        </div>
      </div>
    </>
  );
}

// ── BIZ ADMIN DASHBOARD ─────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function Dashboard({stats,leads,users,currentUser,openLead,openWA,syncGSheet,gSyncStatus,setGSyncStatus}){

  const hasSheet=!!(cfg.gSheetId||"").trim();
  const stageData=DEFAULT_STAGES.map(s=>({stage:s,count:leads.filter(l=>l.stage===s).length}));
  const maxC=Math.max(...stageData.map(s=>s.count),1);
  const recent=[...leads].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  return (
    <>
      {/* Google Sheets sync bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>

          <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"8px 14px",flex:1,flexWrap:"wrap"}}>
            <span style={{fontSize:16}}>📊</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:12}}>Google Sheets Auto-Import</div>
              <div className="xs muted">Sheet: <span style={{fontFamily:"var(--mono)",color:"var(--accent)"}}>{cfg.gSheetTab||"Sheet1"}</span> · Click sync to pull new leads</div>
            </div>
            {gSyncStatus&&!gSyncStatus.loading&&(
              <div className={"xs "+(gSyncStatus.err?"":"bold")} style={{color:gSyncStatus.err?"var(--red)":"var(--green)",maxWidth:240}}>
                {gSyncStatus.err?"⚠️ "+gSyncStatus.err:"✅ +"+gSyncStatus.added+" new · "+gSyncStatus.skipped+" skipped"}
              </div>
            )}
            <button className="btn btn-primary btn-sm" disabled={gSyncStatus&&gSyncStatus.loading} onClick={syncGSheet} style={{flexShrink:0}}>
              {gSyncStatus&&gSyncStatus.loading?"⏳ Syncing...":"🔄 Sync Now"}
            </button>
            {gSyncStatus&&<button className="btn btn-ghost btn-sm" onClick={()=>setGSyncStatus(null)}>✕</button>}

        ):(
          <div style={{background:"rgba(0,212,255,.05)",border:"1px dashed rgba(0,212,255,.2)",borderRadius:10,padding:"8px 14px",fontSize:12,color:"var(--text3)"}}>
            💡 <strong>Auto-import from Facebook/Google Ads?</strong> <a href="#" style={{color:"var(--accent)"}} onClick={e=>{e.preventDefault();alert("Go to Setup → Google Sheets tab to connect your ads sheet.");}}>Set it up in Setup → Google Sheets</a>
          </div>
        )}
      </div>

      <div className="sa-stat-grid">
        <div className="sa-stat"><div className="sa-stat-bar" style={{background:"linear-gradient(90deg,var(--accent),transparent)"}}/><div className="sa-stat-icon">📋</div><div className="sa-stat-val">{stats.total}</div><div className="sa-stat-label">Total Leads</div><div className="sa-stat-sub">All time</div></div>
        <div className="sa-stat"><div className="sa-stat-bar" style={{background:"linear-gradient(90deg,var(--green),transparent)"}}/><div className="sa-stat-icon">✅</div><div className="sa-stat-val" style={{color:"var(--green)"}}>{stats.converted}</div><div className="sa-stat-label">Converted</div><div className="sa-stat-sub">{stats.total?Math.round(stats.converted/stats.total*100):0}% rate</div></div>
        <div className="sa-stat"><div className="sa-stat-bar" style={{background:"linear-gradient(90deg,var(--yellow),transparent)"}}/><div className="sa-stat-icon">💰</div><div className="sa-stat-val" style={{color:"var(--yellow)"}}>{fmt(stats.pipeline)}</div><div className="sa-stat-label">Pipeline Value</div><div className="sa-stat-sub">Active deals</div></div>
        <div className="sa-stat"><div className="sa-stat-bar" style={{background:"linear-gradient(90deg,var(--purple),transparent)"}}/><div className="sa-stat-icon">🗓</div><div className="sa-stat-val" style={{color:"var(--purple)"}}>{stats.followUps}</div><div className="sa-stat-label">Follow-ups Due</div><div className="sa-stat-sub">Upcoming</div></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}} className="dash-grid">
        <div className="card"><div className="card-title">Pipeline Overview</div><div style={{display:"flex",alignItems:"flex-end",gap:6,height:90}}>{stageData.filter(s=>!["Not Interested","Lost"].includes(s.stage)).map(s=><div key={s.stage} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div className="bar-val xs mono muted">{s.count}</div><div style={{width:"100%",borderRadius:"4px 4px 0 0",height:Math.max((s.count/maxC)*72,s.count?6:2)+"px",background:(SC[s.stage]||"#64748b")+"99"}}/><div style={{fontSize:9,color:"var(--text3)",textAlign:"center"}}>{s.stage.split(" ")[0]}</div></div>)}</div></div>
        <div className="card"><div className="card-title">Lead Sources</div>{leads.length===0?<div className="muted sm">No leads yet</div>:Object.entries(leads.reduce((acc,l)=>{acc[l.source]=(acc[l.source]||0)+1;return acc},{})).map(([src,cnt])=><div key={src} className="flex ic gap2" style={{marginBottom:9}}><div className="sm" style={{flex:1}}>{src}</div><div style={{flex:2,height:7,background:"var(--surface2)",borderRadius:4,overflow:"hidden"}}><div style={{width:(cnt/leads.length*100)+"%",height:"100%",background:"var(--accent)",borderRadius:4,opacity:.7}}/></div><div className="xs mono muted" style={{width:20,textAlign:"right"}}>{cnt}</div></div>)}</div>
      </div>
      <div className="table-wrap">
        <div style={{padding:"12px 16px",fontWeight:800,fontSize:13,borderBottom:"1px solid var(--border)"}}>Recent Leads</div>
        <table><thead><tr><th>Name</th><th>Phone</th><th>Stage</th><th>Value</th><th>Follow-up</th><th>WA</th></tr></thead>
        <tbody>{recent.length===0&&<tr><td colSpan={6}><div className="empty">No leads yet. Add your first lead!</div></td></tr>}{recent.map(l=><tr key={l.id} onClick={()=>openLead(l)} style={{cursor:"pointer"}}><td className="bold">{l.name}</td><td className="mono xs muted">{l.phone}</td><td><StageBadge stage={l.stage}/></td><td className="mono sm" style={{color:"var(--green)"}}>{fmt(l.value||0)}</td><td className="mono xs" style={{color:l.followUp?"var(--yellow)":"var(--text3)"}}>{l.followUp||" - "}</td><td><div className="wa-btn" onClick={e=>openWA(l.phone,e)}>💬</div></td></tr>)}</tbody></table>
      </div>
    </>
  );
}

// ── BUSINESSES PAGE ─────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════
function BusinessesPage({businesses,setBusinesses,users,leads,loginAs}){
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");

  const approve=id=>setBusinesses(p=>p.map(b=>b.id===id?{...b,approved:true,active:true}:b));
  const reject=id=>{if(window.confirm("Reject and delete?"))setBusinesses(p=>p.filter(b=>b.id!==id));};
  const toggle=id=>setBusinesses(p=>p.map(b=>b.id===id?{...b,active:!b.active}:b));

  const filtered=businesses.filter(b=>{
    const ms=b.businessName.toLowerCase().includes(search.toLowerCase())||b.adminName.toLowerCase().includes(search.toLowerCase())||b.city.toLowerCase().includes(search.toLowerCase());
    const mf=filter==="all"||(filter==="pending"&&!b.approved)||(filter==="active"&&b.approved&&b.active)||(filter==="suspended"&&b.approved&&!b.active);
    return ms&&mf;
  });

  const tabs=[{k:"all",l:"All ("+businesses.length+")"},{k:"pending",l:"Pending ("+(businesses.filter(b=>!b.approved).length)+")"},{k:"active",l:"Active ("+(businesses.filter(b=>b.approved&&b.active).length)+")"},{k:"suspended",l:"Suspended ("+(businesses.filter(b=>b.approved&&!b.active).length)+")"}];

  return (
    <>
      <div className="flex ic gap2" style={{marginBottom:14}}>
        <div className="search-wrap" style={{maxWidth:280}}><span className="search-icon">🔍</span><input className="search-input" placeholder="Search businesses..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="flex gap2" style={{marginLeft:"auto"}}>
          {tabs.map(t=><button key={t.k} className={"btn btn-sm "+(filter===t.k?"btn-primary":"btn-ghost")} onClick={()=>setFilter(t.k)}>{t.l}</button>)}
        </div>
      </div>
      <div className="table-wrap">
        <table><thead><tr><th>#</th><th>Business</th><th>Admin</th><th>City / Industry</th><th>Leads</th><th>Users</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9}><div className="empty">No businesses match your filter</div></td></tr>}
          {filtered.map((b,i)=>{
            const bLeads=leads.filter(l=>l.bizId===b.id);
            const bUsers=users.filter(u=>u.bizId===b.id);
            return (
              <tr key={b.id}>
                <td className="mono xs muted">{i+1}</td>
                <td>
                  <div className="flex ic gap2">
                    <BizAvatar name={b.businessName} index={i}/>
                    <div><div className="bold sm">{b.businessName}</div><div className="xs muted">{b.industry}</div></div>
                  </div>
                </td>
                <td><div className="sm bold">{b.adminName}</div><div className="xs muted mono">{b.email}</div><div className="xs muted mono">{b.phone}</div></td>
                <td><div className="sm">{b.city}</div><div className="xs muted">{b.teamSize&&"Team: "+b.teamSize}</div></td>
                <td className="mono bold" style={{color:"var(--accent)"}}>{bLeads.length}</td>
                <td className="mono">{bUsers.length}</td>
                <td><span className={"tag "+(!b.approved?"tag-yellow":b.active?"tag-green":"tag-red")}>{!b.approved?"⏳ Pending":b.active?"✅ Active":"🚫 Suspended"}</span></td>
                <td className="xs muted mono">{b.createdAt}</td>
                <td>
                  <div className="flex gap2" style={{flexWrap:"wrap"}}>
                    {!b.approved&&<><button className="btn btn-sm btn-success" onClick={()=>approve(b.id)}>✅ Approve</button><button className="btn btn-sm btn-danger" onClick={()=>reject(b.id)}>✕ Reject</button></>}
                    {b.approved&&<button className={"btn btn-sm "+(b.active?"btn-danger":"btn-success")} onClick={()=>toggle(b.id)}>{b.active?"Suspend":"Activate"}</button>}
                    {b.approved&&<button className="btn btn-sm btn-purple" onClick={()=>loginAs(b)}>👁 Login As</button>}
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody></table>
      </div>
    </>
  );
}

// ── LEADS PAGE ──────────────────────────────────────────────────

function LeadsPage({leads,search,setSearch,filterStage,setFilterStage,filterSource,setFilterSource,openLead,openWA,setLeads,users}){

  return (
    <>
      <div className="search-bar">
        <div className="search-wrap"><span className="search-icon">🔍</span><input className="search-input" placeholder="Search name or phone..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select className="sel" value={filterStage} onChange={e=>setFilterStage(e.target.value)}><option>All</option>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
        <select className="sel" value={filterSource} onChange={e=>setFilterSource(e.target.value)}><option value="All">All Sources</option>{SOURCES.map(s=><option key={s}>{s}</option>)}</select>

      </div>
      <div className="table-wrap">
        <table><thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Stage</th><th>Assigned</th><th>Value</th><th>Follow-up</th><th>Actions</th></tr></thead>
        <tbody>
          {leads.length===0&&<tr><td colSpan={8}><div className="empty">No leads found</div></td></tr>}
          {leads.map(l=>{
            const a=users.find(u=>u.id===l.assignedTo);
            return <tr key={l.id} onClick={()=>openLead(l)} style={{cursor:"pointer"}}>
              <td className="bold">{l.name}</td>
              <td className="mono xs muted">{l.phone}</td>
              <td><span className="tag tag-blue">{l.source}</span></td>
              <td><StageBadge stage={l.stage}/></td>
              <td className="sm">{a?a.name.split(" ")[0]:" - "}</td>
              <td className="mono sm" style={{color:"var(--green)"}}>{fmt(l.value||0)}</td>
              <td className="mono xs" style={{color:l.followUp?"var(--yellow)":"var(--text3)"}}>{l.followUp||" - "}</td>
              <td onClick={e=>e.stopPropagation()}><div className="flex gap2"><div className="wa-btn" onClick={e=>openWA(l.phone,e)}>💬</div><button className="btn btn-sm btn-ghost" onClick={()=>openLead(l)}>✏️</button><button className="btn btn-sm btn-danger" onClick={e=>del(l.id,e)}>🗑</button></div></td>
            </tr>;
          })}
        </tbody></table>
      </div>
    </>
  );
}
