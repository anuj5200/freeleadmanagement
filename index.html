                <div className="form-group"><label>Email</label><input type="email" value={f.email||""} onChange={e=>upd("email",e.target.value)}/></div>
                <div className="form-group"><label>Value (₹)</label><input type="number" value={f.value||0} onChange={e=>upd("value",Number(e.target.value))}/></div>
                <div className="form-group"><label>Stage</label><select value={f.stage} onChange={e=>upd("stage",e.target.value)}>{STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="form-group"><label>Assign To</label><select value={f.assignedTo||""} onChange={e=>upd("assignedTo",e.target.value)}><option value="">Unassigned</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                <div className="form-group"><label>Source</label><select value={f.source} onChange={e=>upd("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="form-group"><label>Follow-up Date</label><input type="date" value={f.followUp||""} onChange={e=>upd("followUp",e.target.value)}/></div>
              </div>
              <div className="flex gap2" style={{justifyContent:"flex-end"}}><button className="btn btn-ghost" onClick={()=>setEdit(false)}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Changes</button></div>
              <div className="divider"/>
            </div>
          )}
          <div className="tabs">
            {[{k:"timeline",l:"📅 Timeline"},{k:"notes",l:"📝 Notes"},{k:"calls",l:"📞 Calls"},{k:"followup",l:"🗓 Follow-up"}].map(t=><div key={t.k} className={`tab${tab===t.k?" active":""}`} onClick={()=>setTab(t.k)}>{t.l}</div>)}
          </div>
          {tab==="timeline"&&(
            <div>
              <div className="tl-item"><div className="tl-dot"/><div><div className="sm">Lead created · <strong>{lead.source}</strong></div><div className="xs muted mono">{lead.createdAt}</div></div></div>
              {(lead.notes||[]).map((n,i)=><div key={i} className="tl-item"><div className="tl-dot" style={{background:"var(--yellow)"}}/><div><div className="sm">📝 {n.text}</div><div className="xs muted mono">{n.date}</div></div></div>)}
              {(lead.calls||[]).map((c,i)=><div key={i} className="tl-item"><div className="tl-dot" style={{background:"var(--green)"}}/><div><div className="sm">📞 {c.type} · {c.duration} · {c.outcome}</div><div className="xs muted mono">{c.date}</div></div></div>)}
              {lead.followUp&&<div className="tl-item"><div className="tl-dot" style={{background:"var(--purple)"}}/><div><div className="sm">🗓 Follow-up: {lead.followUp}</div></div></div>}
            </div>
          )}
          {tab==="notes"&&(
            <div>
              {(lead.notes||[]).length===0&&<p className="muted sm" style={{marginBottom:12}}>No notes yet.</p>}
              {(lead.notes||[]).map((n,i)=><div key={i} style={{background:"var(--surface2)",borderRadius:9,padding:12,marginBottom:10}}><div className="sm">{n.text}</div><div className="xs muted mono" style={{marginTop:4}}>{n.date}</div></div>)}
              <div className="flex gap2" style={{marginTop:12}}><input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="Type note + Enter" style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&addNote()}/><button className="btn btn-primary" onClick={addNote}>+ Add</button></div>
            </div>
          )}
          {tab==="calls"&&(
            <div>
              {(lead.calls||[]).length===0&&<p className="muted sm" style={{marginBottom:12}}>No calls yet.</p>}
              {(lead.calls||[]).map((c,i)=><div key={i} style={{background:"var(--surface2)",borderRadius:9,padding:12,marginBottom:10,display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:20}}>📞</span><div><div style={{fontWeight:700,fontSize:13}}>{c.type} · {c.duration}</div><div className="sm muted">{c.outcome} · {c.date}</div></div></div>)}
              <div className="flex gap2" style={{marginTop:12}}><input type="text" value={callNote} onChange={e=>setCallNote(e.target.value)} placeholder="Call outcome..." style={{flex:1}}/><button className="btn btn-primary" onClick={addCall}>📞 Log</button></div>
            </div>
          )}
          {tab==="followup"&&(
            <div>
              <div className="form-group" style={{maxWidth:260,marginBottom:14}}><label>📅 Pick Date</label><input type="date" value={f.followUp||""} onChange={e=>{upd("followUp",e.target.value);setLeads(p=>p.map(l=>l.id===lead.id?{...l,followUp:e.target.value}:l));}}/></div>
              {f.followUp&&<div className="alert alert-warn" style={{maxWidth:260}}>Follow-up set: <strong>{f.followUp}</strong></div>}
              <button className="btn btn-danger btn-sm" onClick={()=>{upd("followUp","");setLeads(p=>p.map(l=>l.id===lead.id?{...l,followUp:""}:l));}}>🗑 Clear</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
